<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    background: linear-gradient(180deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1a 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    margin: 0;
    padding: 10px;
  }
  #game-wrapper {
    position: relative;
    width: 100vw;
    max-width: 1400px;
    background: rgba(0,0,0,0.4);
    border-radius: 24px;
    padding: 20px;
    box-shadow: 
      0 0 0 3px rgba(255,215,0,0.2),
      0 0 0 6px rgba(0,0,0,0.5),
      0 20px 80px rgba(0,0,0,0.8),
      inset 0 0 100px rgba(100,0,255,0.1);
  }
  #game-container {
    position: relative;
    width: 100%;
    height: 600px;
    background: linear-gradient(180deg, #0a0a1e 0%, #151530 50%, #1a1030 100%);
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
    border-radius: 16px;
    border: 3px solid #ffd700;
    box-shadow: 
      inset 0 0 100px rgba(0,0,0,0.7),
      0 0 40px rgba(255,215,0,0.2);
    cursor: default;
  }
  #hud {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    padding: 15px 20px;
    background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(20,0,40,0.8) 100%);
    color: white;
    font-size: 8px;
    z-index: 100;
    border-bottom: 2px solid rgba(255,215,0,0.4);
    backdrop-filter: blur(20px);
    letter-spacing: 1px;
  }
  .hud-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 6px;
    background: rgba(0,0,0,0.4);
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    transition: all 0.3s ease;
  }
  .hud-item:hover {
    border-color: rgba(255,215,0,0.5);
    box-shadow: 0 0 15px rgba(255,215,0,0.2);
  }
  .hud-label {
    font-size: 6px;
    color: #ffd700;
    text-transform: uppercase;
    text-shadow: 0 0 8px rgba(255,215,0,0.4);
  }
  .hud-value {
    font-size: 11px;
    color: #fff;
    text-shadow: 0 0 10px rgba(255,255,255,0.4);
  }
  .hud-bar {
    width: 100%;
    height: 6px;
    background: rgba(0,0,0,0.5);
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .hud-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s ease;
  }
  .hp-bar { background: linear-gradient(90deg, #ff0000, #ff4444); }
  .mana-bar { background: linear-gradient(90deg, #0000ff, #4444ff); }
  .xp-bar { background: linear-gradient(90deg, #ffd700, #ffaa00); }
  
  #game-canvas { display: block; width: 100%; height: 100%; border-radius: 12px; }
  
  #start-screen, #game-over-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    z-index: 200;
    border-radius: 16px;
  }
  #start-screen {
    background: radial-gradient(ellipse at center, rgba(20,0,40,0.9) 0%, rgba(0,0,0,0.95) 100%);
    backdrop-filter: blur(20px);
  }
  #game-over-screen {
    background: radial-gradient(ellipse at center, rgba(50,0,0,0.9) 0%, rgba(0,0,0,0.95) 100%);
    backdrop-filter: blur(20px);
  }
  
  .title-container {
    text-align: center;
    margin-bottom: 40px;
    position: relative;
  }
  .game-title {
    font-size: 42px;
    margin-bottom: 15px;
    background: linear-gradient(180deg, #ffd700 0%, #ff6600 50%, #cc0000 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px rgba(255,215,0,0.8));
    animation: titleGlow 2s ease-in-out infinite;
  }
  @keyframes titleGlow {
    0%, 100% { filter: drop-shadow(0 0 30px rgba(255,215,0,0.8)); }
    50% { filter: drop-shadow(0 0 50px rgba(255,100,0,1)); }
  }
  .game-subtitle {
    font-size: 12px;
    color: #ffd700;
    text-shadow: 0 0 15px rgba(255,215,0,0.6);
    animation: subtitleFloat 3s ease-in-out infinite;
    letter-spacing: 3px;
  }
  @keyframes subtitleFloat {
    0%, 100% { transform: translateY(0); opacity: 0.8; }
    50% { transform: translateY(-8px); opacity: 1; }
  }
  
  .controls-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin: 30px 0;
    max-width: 600px;
  }
  .control-card {
    background: rgba(0,0,0,0.6);
    border: 2px solid rgba(255,215,0,0.2);
    border-radius: 12px;
    padding: 15px;
    backdrop-filter: blur(10px);

    border-color: rgba(255,215,0,0.6);
    box-shadow: 0 0 25px rgba(255,215,0,0.2);

    display: inline-block;
    background: rgba(255,215,0,0.15);
    border: 2px solid #ffd700;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 8px;
    color: #ffd700;
    min-width: 40px;
    text-align: center;
  }
  
  .game-btn {
    margin-top: 30px;
    padding: 16px 40px;
    background: linear-gradient(180deg, #ffd700 0%, #ff6600 100%);
    color: #000;
    border: none;
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    cursor: pointer;
    border-radius: 12px;
    border-bottom: 5px solid #993300;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 3px;
    position: relative;
    overflow: hidden;
  }
  .game-btn::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: transform 0.5s ease;
  }

  }
  .game-btn:active {
    transform: translateY(2px);

  }

  .inventory-slot {

  }

<script>
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('game-container');
const minimap = document.getElementById('minimap');
const minimapCtx = minimap.getContext('2d');

function resizeCanvas() {
  canvas.width = container.clientWidth;
  canvas.height = container.clientHeight;
}
resizeCanvas();

// Audio System
let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playSound(freq, type='square', duration=0.1, volume=0.08) {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

// Music System
const musicSystem = {
  tracks: {
    main: [262, 294, 330, 349, 392, 440, 494, 523],
    boss: [130, 165, 196, 220, 262, 311, 370, 440],
    victory: [523, 659, 784, 1047]
  },
  currentTrack: 'main',
  noteIndex: 0,
  tempo: 200,
  lastNoteTime: 0,
  update() {
    if (!audioCtx || !gameRunning) return;
    const now = Date.now();
    if (now - this.lastNoteTime > 60000 / this.tempo) {
      const notes = this.tracks[this.currentTrack];
      const freq = notes[this.noteIndex % notes.length];
      playSound(freq, 'square', 0.12, 0.03);
      if (this.noteIndex % 2 === 0) playSound(freq * 1.5, 'square', 0.12, 0.02);
      this.noteIndex++;
      this.lastNoteTime = now;
    }
  },
  switchTrack(track) {
    this.currentTrack = track;
    this.noteIndex = 0;
    this.tempo = track === 'boss' ? 150 : 200;
  }
};

let platforms, pipes, enemies, gemItems, powerups;
let hero = {};

function initGame() {
  hero = {
    x: 80, y: 340, w: 28, h: 32, vx: 0, vy: 0,
    onGround: false, dead: false, deathTimer: 0,
    facingRight: true, walkFrame: 0, walkTimer: 0,
    jumping: false, invincible: 0, big: false, fire: false,
    starTimer: 0, attacking: false, attackTimer: 0
  };
  platforms = makePlatforms();
  pipes = makePipes();
  enemies = makeEnemies();
  gemItems = makeGems();
  powerups = [];
  projectiles = [];
  boss = null;
  bossActive = false;
  heroHP = heroMaxHP;
  heroMana = heroMaxMana;
  heroAttackCooldown = 0;
  heroXP = 0;
  heroLevel = 1;
  inventory = { potions: 0, scrolls: 0, keys: 0, artifacts: [] };
  weather = { type: 'clear', intensity: 0.3, particles: [] };
  cameraX = 0;
  particles = [];
  floatingTexts = [];
  comboCount = 0;
  comboTimer = 0;
  updateHUD();
  updateInventoryDisplay();
}

function spawnParticles(x, y, color, count=6) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y, vx: (Math.random()-0.5)*8, vy: -Math.random()*8 - 2,
      life: 35, maxLife: 35, color, size: Math.random()*8+2
    });
  }
}

function addFloatingText(x, y, text, color='#ffd700') {
  floatingTexts.push({x, y, text, color, life: 60, vy: -1.5});
}

function rectOverlap(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function shakeScreen(intensity = 5) { screenShake = intensity; }

function addComboScore(baseScore) {
  comboCount++;
  comboTimer = 90;
  const multiplier = Math.min(comboCount, 15);
  const bonus = Math.floor(baseScore * (multiplier - 1) * 0.5);
  if (comboCount > 1) {
    const comboEl = document.getElementById('combo-display');
    comboEl.classList.remove('hidden');
    comboEl.textContent = `⚡ ${comboCount}x COMBO! +${bonus}`;
  }
  if (comboCount >= 10 && !ACHIEVEMENTS.comboKing.unlocked) {
    ACHIEVEMENTS.comboKing.unlocked = true;
    showAchievement('Roi des Combos');
  }
  return baseScore + bonus;
}

function showAchievement(name) {
  const popup = document.createElement('div');
  popup.style.cssText = `
    position:absolute;top:100px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,0.9);color:#ffd700;padding:15px 25px;
    border:2px solid #ffd700;border-radius:12px;font-size:10px;
    z-index:250;animation:achievementShow 2.5s ease-out;
    text-align:center;white-space:nowrap;
  `;
  popup.innerHTML = `🏆 Succès: <b>${name}</b>!`;
  document.getElementById('game-container').appendChild(popup);
  setTimeout(() => popup.remove(), 2500);
}

function spawnPowerup(x, y, type) {
  powerups.push({ x, y, w: 24, h: 24, vx: 2, vy: -8, type, alive: true, onGround: false });
}

function castFireball() {
  if (heroMana >= 20 && hero.fire) {
    heroMana -= 20;
    const fb = {
      x: hero.x + (hero.facingRight ? hero.w : -16), y: hero.y + hero.h/2 - 8,
      vx: hero.facingRight ? 7 : -7, vy: 0, w: 16, h: 16,
      life: 80, type: 'fireball', damage: 2
    };
    projectiles.push(fb);
    playSound(600, 'sawtooth', 0.2, 0.1);
    spawnParticles(fb.x, fb.y, '#ff4400', 5);
  }
}

function castMeteor() {
  if (heroMana >= 50) {
    heroMana -= 50;
    for (let i = 0; i < 4; i++) {
      projectiles.push({
        x: hero.x + Math.random() * 500 - 250, y: -60,
        vx: (Math.random()-0.5)*2, vy: 6 + Math.random() * 4,
        w: 28, h: 28, life: 120, type: 'meteor', damage: 3
      });
    }
    playSound(100, 'sawtooth', 0.6, 0.15);
    shakeScreen(12);
  }
}

function updateInventoryDisplay() {
  document.getElementById('potion-count').textContent = inventory.potions;
  document.getElementById('scroll-count').textContent = inventory.scrolls;
  document.getElementById('key-count').textContent = inventory.keys;
}

function usePotion() {
  if (inventory.potions > 0 && heroHP < heroMaxHP) {
    inventory.potions--;
    heroHP = Math.min(heroHP + 2, heroMaxHP);
    spawnParticles(hero.x, hero.y, '#ff4444', 15);
    addFloatingText(hero.x, hero.y - 10, '+2 PV', '#ff4444');
    playSound(800, 'square', 0.3, 0.1);
    updateInventoryDisplay();
  }
}

function useScroll() {
  if (inventory.scrolls > 0) {
    inventory.scrolls--;
    hero.invincible = 240;
    hero.starTimer = 240;
    spawnParticles(hero.x, hero.y, '#ffd700', 20);
    addFloatingText(hero.x, hero.y - 10, 'INVULNÉRABLE!', '#ffd700');
    playSound(1000, 'square', 0.5, 0.15);
    updateInventoryDisplay();
  }
}

function updateHero() {
  if (hero.dead) {
    hero.deathTimer++;
    if (hero.deathTimer < 20) hero.vy -= 0.5;
    else hero.vy += GRAVITY;
    hero.y += hero.vy;
    if (hero.deathTimer === 1) {
      playSound(150, 'sawtooth', 0.5, 0.15);
      shakeScreen(10);
    }
    if (hero.deathTimer > 80) {
      lives--;
      document.getElementById('lives-display').textContent = 'x0'+Math.max(0,lives);
      if (lives <= 0) { gameOver(); }
      else { initGame(); }
    }
    return;
  }

  if (hero.invincible > 0) hero.invincible--;
  if (hero.starTimer > 0) {
    hero.starTimer--;
    if (hero.starTimer === 0) hero.invincible = 0;
  }
  if (heroAttackCooldown > 0) heroAttackCooldown--;
  if (hero.attacking) {
    hero.attackTimer--;
    if (hero.attackTimer <= 0) hero.attacking = false;
  }

  // Mana regen
  heroMana = Math.min(heroMana + 0.1, heroMaxMana);

  // Movement
  if (keys['ArrowLeft'] || keys['a'] || keys['A'] || keys['q'] || keys['Q']) {
    hero.vx = -MOVE_SPEED;
    hero.facingRight = false;
  } else if (keys['ArrowRight'] || keys['d'] || keys['D']) {
    hero.vx = MOVE_SPEED;
    hero.facingRight = true;
  } else {
    hero.vx *= 0.8;
  }

  // Jump
  if ((keys[' '] || keys['ArrowUp'] || keys['w'] || keys['W'] || keys['z'] || keys['Z']) && hero.onGround) {
    hero.vy = JUMP_FORCE;
    hero.onGround = false;
    hero.jumping = true;
    playSound(400, 'square', 0.1, 0.08);
  }

  // Attack
  if ((keys['x'] || keys['X']) && heroAttackCooldown <= 0 && hero.onGround) {
    hero.attacking = true;
    hero.attackTimer = 15;
    heroAttackCooldown = ATTACK_COOLDOWN;
    playSound(200, 'sawtooth', 0.12, 0.08);
  }

  // Spells
  if ((keys['c'] || keys['C']) && hero.fire) castFireball();
  if ((keys['v'] || keys['V']) && hero.fire) castMeteor();

  // Items
  if (keys['1']) { usePotion(); keys['1'] = false; }
  if (keys['2']) { useScroll(); keys['2'] = false; }

  hero.vy += GRAVITY;
  hero.x += hero.vx;
  hero.y += hero.vy;
  hero.x = Math.max(0, hero.x);
  hero.onGround = false;

  // Flag pole
  if (hero.x + hero.w > FLAG_POLE.x && hero.x < FLAG_POLE.x + FLAG_POLE.w &&
      hero.y + hero.h > FLAG_POLE.y && hero.y < FLAG_POLE.y + FLAG_POLE.h) {
    score += 10000;
    updateHUD();
    playSound(600, 'square', 0.3, 0.1);
    playSound(800, 'square', 0.3, 0.1);
    playSound(1000, 'square', 0.5, 0.15);
    musicSystem.switchTrack('victory');
    spawnParticles(FLAG_POLE.x, FLAG_POLE.y, '#ffd700', 30);
    addFloatingText(FLAG_POLE.x, FLAG_POLE.y - 20, 'QUÊTE TERMINÉE!', '#00ff00');
    setTimeout(() => {
      if (gameRunning) {
        score += timeLeft * 50;
        heroXP += 1000;
        updateHUD();
        addFloatingText(hero.x, hero.y - 20, `BONUS +${timeLeft*50}`, '#00ff00');
        setTimeout(() => gameOver(), 2000);
      }
    }, 1000);
    hero.vx = 0;
    hero.vy = 0;
    return;
  }

  // Platform collisions
  for (const p of platforms) {
    if (rectOverlap(hero, p)) {
      const overlapX = Math.min(hero.x+hero.w, p.x+p.w) - Math.max(hero.x, p.x);
      const overlapY = Math.min(hero.y+hero.h, p.y+p.h) - Math.max(hero.y, p.y);
      if (overlapY < overlapX) {
        if (hero.vy > 0 && hero.y+hero.h-hero.vy <= p.y+2) {
          hero.y = p.y - hero.h;
          hero.vy = 0;
          hero.onGround = true;
          hero.jumping = false;
        } else if (hero.vy < 0 && hero.y >= p.y+p.h-4) {
          hero.y = p.y + p.h;
          hero.vy = 0;
          if (p.type === 'crystal' && p.gemLeft > 0) {
            p.gemLeft--;
            gems++;
            score += 200;
            updateHUD();
            playSound(800, 'square', 0.15, 0.08);
            spawnParticles(p.x+16, p.y, '#ff00ff', 8);
            addFloatingText(p.x+16, p.y-10, '+200');
            p.type = 'used';
            if (Math.random() < 0.4) {
              const type = Math.random() < 0.5 ? 'potion' : 'scroll';
              spawnPowerup(p.x + p.w/2, p.y - 24, type);
            }
          }
        }
      } else {
        if (hero.vx > 0) hero.x = p.x - hero.w;
        else if (hero.vx < 0) hero.x = p.x + p.w;
        hero.vx = 0;
      }
    }
  }

  // Pipe collisions
  for (const pipe of pipes) {
    if (rectOverlap(hero, pipe)) {
      const overlapX = Math.min(hero.x+hero.w, pipe.x+pipe.w) - Math.max(hero.x, pipe.x);
      const overlapY = Math.min(hero.y+hero.h, pipe.y+pipe.h) - Math.max(hero.y, pipe.y);
      if (overlapY < overlapX) {
        if (hero.vy > 0 && hero.y+hero.h-hero.vy <= pipe.y+4) {
          hero.y = pipe.y - hero.h;
          hero.vy = 0;
          hero.onGround = true;
          hero.jumping = false;
        }
      } else {
        if (hero.vx > 0) hero.x = pipe.x - hero.w;
        else if (hero.vx < 0) hero.x = pipe.x + pipe.w;
        hero.vx = 0;
      }
    }
  }

  // Gem collection
  for (const gem of gemItems) {
    if (!gem.collected && hero.x < gem.x+16 && hero.x+hero.w > gem.x && hero.y < gem.y+16 && hero.y+hero.h > gem.y) {
      gem.collected = true;
      gems++;
      const points = addComboScore(100);
      score += points;
      updateHUD();
      playSound(1200, 'square', 0.1, 0.06);
      spawnParticles(gem.x+8, gem.y+8, '#ff00ff', 5);
      addFloatingText(gem.x, gem.y, `+${points}`);
    }
  }

  // Powerup collection
  for (const pu of powerups) {
    if (!pu.alive) continue;
    if (rectOverlap(hero, pu)) {
      pu.alive = false;
      playSound(1000, 'square', 0.2, 0.1);
      if (pu.type === 'potion') {
        inventory.potions++;
        addFloatingText(pu.x, pu.y, 'Potion +1', '#ff4444');
        spawnParticles(pu.x, pu.y, '#ff4444', 8);
      } else if (pu.type === 'scroll') {
        hero.big = true;
        hero.h = 48;
        hero.y -= 16;
        addFloatingText(pu.x, pu.y, 'GRAND!', '#ff8800');
        spawnParticles(pu.x, pu.y, '#ff8800', 8);
      }
      updateInventoryDisplay();
    }
  }

  // Enemy collisions
  for (const e of enemies) {
    if (!e.alive) continue;
    if (!rectOverlap(hero, e)) continue;
    
    // Attack hit
    if (hero.attacking) {
      const attackRange = hero.facingRight ? hero.x + hero.w : hero.x - 30;
      if ((hero.facingRight && e.x < attackRange + 30 && e.x + e.w > attackRange) ||
          (!hero.facingRight && e.x + e.w > attackRange && e.x < attackRange + 30)) {
        e.hp--;
        if (e.hp <= 0) {
          e.alive = false;
          const points = addComboScore(150);
          score += points;
          heroXP += 50;
          updateHUD();
          spawnParticles(e.x+14, e.y+10, '#ff0000', 8);
          addFloatingText(e.x+14, e.y, `+${points}`);
        } else {
          spawnParticles(e.x+14, e.y+10, '#ffaa00', 4);
        }
        continue;
      }
    }
    
    if (hero.invincible > 0) {
      e.alive = false;
      score += addComboScore(200);
      updateHUD();
      spawnParticles(e.x+14, e.y+10, '#ffff00', 8);
      continue;
    }
    
    const hBottom = hero.y + hero.h;
    const eTop = e.y;
    if (hero.vy > 0 && hBottom - hero.vy <= eTop + 6) {
      e.hp--;
      if (e.hp <= 0) {
        e.alive = false;
        if (e.type === 'knight' && !e.shell) {
          e.shell = true; e.alive = true; e.h = 24; e.y += 12; e.vx = 0; e.type = 'armor';
        }
      }
      hero.vy = -7;
      const points = addComboScore(100);
      score += points;
      heroXP += 30;
      updateHUD();
      playSound(500, 'square', 0.15, 0.08);
      spawnParticles(e.x+14, e.y+10, '#660066', 6);
      addFloatingText(e.x+14, e.y, `+${points}`);
    } else {
      heroHP--;
      hero.invincible = 60;
      playSound(200, 'square', 0.2, 0.1);
      shakeScreen(8);
      spawnParticles(hero.x+14, hero.y+16, '#ff0000', 10);
      if (heroHP <= 0) {
        hero.dead = true;
        hero.vy = -10;
        hero.deathTimer = 0;
      }
    }
  }

  // Projectile updates
  for (let i = projectiles.length-1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx;
    p.y += p.vy;
    if (p.type === 'meteor') p.vy += 0.2;
    p.life--;
    
    // Hit enemies
    for (const e of enemies) {
      if (!e.alive) continue;
      if (rectOverlap(p, e)) {
        e.hp -= p.damage;
        if (e.hp <= 0) {
          e.alive = false;
          const points = addComboScore(150);
          score += points;
          spawnParticles(e.x+14, e.y+10, '#ff4400', 10);
          addFloatingText(e.x+14, e.y, `+${points}`);
        }
        projectiles.splice(i, 1);
        break;
      }
    }
    
    if (p.life <= 0 || p.y > canvas.height + 100 || p.x < cameraX - 100 || p.x > cameraX + canvas.width + 100) {
      if (p.type === 'meteor' && p.y > WORLD.groundY) {
        spawnParticles(p.x, WORLD.groundY, '#ff6600', 12);
        shakeScreen(4);
      }
      projectiles.splice(i, 1);
    }
  }

  // Fall death
  if (hero.y > canvas.height + 100) {
    hero.dead = true;
    hero.vy = 0;
    hero.deathTimer = 60;
    playSound(100, 'sawtooth', 0.5, 0.15);
  }

  // Animation
  if (hero.onGround && Math.abs(hero.vx) > 0.5) {
    hero.walkTimer++;
    if (hero.walkTimer > 8) { hero.walkFrame = (hero.walkFrame + 1) % 3; hero.walkTimer = 0; }
    if (Math.random() < 0.3) spawnParticles(hero.x + 14, hero.y + hero.h - 2, '#666', 1);
  } else if (!hero.onGround) {
    hero.walkFrame = 2;
  } else {
    hero.walkFrame = 0;
  }

  // Camera
  const targetX = hero.x - canvas.width/3;
  cameraX += (targetX - cameraX) * 0.1;
  cameraX = Math.max(0, Math.min(cameraX, WORLD.width - canvas.width));

  if (screenShake > 0) screenShake *= 0.85;
  if (screenShake < 0.1) screenShake = 0;

  // HUD updates
  document.getElementById('hp-bar').style.width = ((heroHP / heroMaxHP) * 100) + '%';
  document.getElementById('mana-bar').style.width = ((heroMana / heroMaxMana) * 100) + '%';
}

function updateEnemies() {
  for (const e of enemies) {
    if (!e.alive) continue;
    if (e.type === 'armor' && e.vx === 0) continue;
    
    e.x += e.vx;
    e.vy += GRAVITY;
    e.y += e.vy;

    for (const p of platforms) {
      if (rectOverlap(e, p)) {
        if (e.vy >= 0 && e.y+e.h-e.vy <= p.y+4) {
          e.y = p.y - e.h; e.vy = 0;
        } else { e.vx = -e.vx; }
      }
    }
    for (const pipe of pipes) {
      if (rectOverlap(e, pipe)) {
        e.vx = -e.vx;
        if (e.vx > 0) e.x = pipe.x + pipe.w;
        else e.x = pipe.x - e.w;
      }
    }
    if (e.x < 0 || e.x > WORLD.width) e.vx = -e.vx;

    e.frameTimer++;
    if (e.frameTimer > 10) { e.frame = (e.frame+1)%2; e.frameTimer = 0; }
  }

  // Powerups
  for (const pu of powerups) {
    if (!pu.alive) continue;
    pu.x += pu.vx;
    pu.vy += GRAVITY;
    pu.y += pu.vy;
    for (const p of platforms) {
      if (rectOverlap(pu, p) && pu.vy >= 0) { pu.y = p.y - pu.h; pu.vy = 0; }
    }
    for (const pipe of pipes) {
      if (rectOverlap(pu, pipe)) pu.vx = -pu.vx;
    }
    if (pu.x < -50 || pu.x > WORLD.width + 50) pu.alive = false;
  }

  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer === 0) {
      comboCount = 0;
      document.getElementById('combo-display').classList.add('hidden');
    }
  }
}

function updateWeather() {
  if (Math.random() < weather.intensity * 0.1) {
    weather.particles.push({
      x: Math.random() * canvas.width,
      y: -10,
      vy: 2 + Math.random() * 3,
      vx: (Math.random() - 0.5) * 1,
      life: 150
    });
  }
  for (let i = weather.particles.length-1; i >= 0; i--) {
    const p = weather.particles[i];
    p.y += p.vy;
    p.x += p.vx;
    p.life--;
    if (p.life <= 0 || p.y > canvas.height) weather.particles.splice(i, 1);
  }
}

function updateParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.3;
    p.life--;
    if (p.life <= 0) particles.splice(i,1);
  }
  for (let i = floatingTexts.length-1; i >= 0; i--) {
    const t = floatingTexts[i];
    t.y += t.vy;
    t.life--;
    if (t.life <= 0) floatingTexts.splice(i,1);
  }
}

function updateHUD() {
  document.getElementById('score-display').textContent = String(score).padStart(6,'0');
  document.getElementById('coin-display').textContent = 'x'+String(gems).padStart(2,'0');
}

function drawBackground() {
  const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
  gradient.addColorStop(0, '#0a0a1e');
  gradient.addColorStop(0.5, '#151530');
  gradient.addColorStop(1, '#1a1030');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const time = Date.now() / 1000;
  for (const star of stars) {
    const sx = ((star.x - cameraX * star.speed) % (WORLD.width + 200) + WORLD.width + 200) % (WORLD.width + 200) - 100;
    if (sx > -10 && sx < canvas.width + 10) {
      const alpha = 0.4 + Math.sin(time * 3 + star.twinkle) * 0.4;
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.beginPath();
      ctx.arc(sx, star.y, star.size, 0, Math.PI*2);
      ctx.fill();
    }
  }

  const moonX = ((800 - cameraX * 0.03) % (WORLD.width + 400) + WORLD.width + 400) % (WORLD.width + 400) - 200;
  if (moonX > -100 && moonX < canvas.width + 100) {
    ctx.fillStyle = '#ddd8cc';
    ctx.shadowColor = '#ddd8cc';
    ctx.shadowBlur = 40;
    ctx.beginPath();
    ctx.arc(moonX, 70, 45, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#0a0a1e';
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(moonX + 15, 60, 40, 0, Math.PI*2);
    ctx.fill();
  }

  // Mountains
  ctx.fillStyle = '#15153e';
  const mts = [
    {x:100, y:180, w:220, h:220}, {x:550, y:160, w:270, h:240},
    {x:950, y:190, w:200, h:210}, {x:1450, y:170, w:240, h:230},
    {x:1950, y:195, w:210, h:205}, {x:2450, y:175, w:250, h:225},
    {x:2950, y:185, w:230, h:215}, {x:3450, y:165, w:260, h:235},
  ];
  for (const m of mts) {
    const sx = ((m.x - cameraX * 0.15) % (WORLD.width + 300) + WORLD.width + 300) % (WORLD.width + 300) - 150;
    if (sx > -m.w && sx < canvas.width + m.w) {
      ctx.beginPath();
      ctx.moveTo(sx, m.y + m.h);
      ctx.lineTo(sx + m.w/2, m.y);
      ctx.lineTo(sx + m.w, m.y + m.h);
      ctx.fill();
    }
  }
}

function drawFlagPole() {
  const sx = FLAG_POLE.x - cameraX;
  if (sx < -50 || sx > canvas.width + 50) return;
  ctx.fillStyle = '#555';
  ctx.fillRect(sx, FLAG_POLE.y, FLAG_POLE.w, FLAG_POLE.h);
  ctx.fillStyle = '#ff00ff';
  ctx.shadowColor = '#ff00ff';
  ctx.shadowBlur = 20;
  ctx.beginPath();
  ctx.arc(sx + FLAG_POLE.w/2, FLAG_POLE.y, 12, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
  const wave = Math.sin(Date.now()/250) * 3;
  ctx.fillStyle = '#ff00ff';
  ctx.globalAlpha = 0.7;
  ctx.beginPath();
  ctx.moveTo(sx + FLAG_POLE.w, FLAG_POLE.y + 10);
  ctx.lineTo(sx + FLAG_POLE.w + 35 + wave, FLAG_POLE.y + 20);
  ctx.lineTo(sx + FLAG_POLE.w + 35 + wave, FLAG_POLE.y + 45);
  ctx.lineTo(sx + FLAG_POLE.w, FLAG_POLE.y + 35);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawPlatforms() {
  for (const p of platforms) {
    const sx = p.x - cameraX;
    if (sx > canvas.width || sx+p.w < 0) continue;
    if (p.type === 'ground') {
      ctx.fillStyle = '#1a1030';
      ctx.fillRect(sx, p.y, p.w, 16);
      ctx.fillStyle = '#0f0820';
      ctx.fillRect(sx, p.y+16, p.w, p.h-16);
    } else if (p.type === 'stone') {
      ctx.fillStyle = '#3a2a5e';
      ctx.fillRect(sx, p.y, p.w, p.h);
      ctx.fillStyle = '#2a1a4e';
      for (let tx = 0; tx < p.w; tx += 16) ctx.fillRect(sx+tx, p.y, 1, p.h);
    } else if (p.type === 'crystal') {
      ctx.fillStyle = '#ff00ff';
      ctx.shadowColor = '#ff00ff';
      ctx.shadowBlur = 15;
      ctx.fillRect(sx, p.y, p.w, p.h);
      ctx.shadowBlur = 0;
    } else if (p.type === 'used') {
      ctx.fillStyle = '#444';
      ctx.fillRect(sx, p.y, p.w, p.h);
    }
  }
}

function drawPipes() {
  for (const pipe of pipes) {
    const sx = pipe.x - cameraX;
    if (sx > canvas.width || sx+pipe.w < 0) continue;
    ctx.fillStyle = '#2a1a4e';
    ctx.fillRect(sx+4, pipe.y+16, pipe.w-8, pipe.h-16);
    ctx.fillStyle = '#3a2a6e';
    ctx.fillRect(sx, pipe.y, pipe.w, 16);
  }
}

function drawGems() {
  for (const c of gemItems) {
    if (c.collected) continue;
    const sx = c.x - cameraX;
    if (sx < -20 || sx > canvas.width+20) continue;
    const bob = Math.sin(Date.now()/300 + c.x)*3;
    ctx.fillStyle = '#ff00ff';
    ctx.shadowColor = '#ff00ff';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.moveTo(sx+8, c.y+bob);
    ctx.lineTo(sx+16, c.y+8+bob);
    ctx.lineTo(sx+8, c.y+16+bob);
    ctx.lineTo(sx, c.y+8+bob);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function drawShadow(e) {
  const sx = e.x - cameraX;
  ctx.fillStyle = '#1a0020';
  ctx.fillRect(sx+2, e.y+8, e.w-4, e.h-8);
  ctx.fillStyle = '#ff0000';
  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur = 6;
  ctx.fillRect(sx+6, e.y+8, 5, 5);
  ctx.fillRect(sx+e.w-11, e.y+8, 5, 5);
  ctx.shadowBlur = 0;
}

function drawKnight(e) {
  const sx = e.x - cameraX;
  ctx.fillStyle = '#444';
  ctx.fillRect(sx+4, e.y+4, e.w-8, e.h-8);
  ctx.fillStyle = '#666';
  ctx.fillRect(sx+6, e.y-4, 16, 12);
  ctx.fillStyle = '#ff0000';
  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur = 4;
  ctx.fillRect(sx+8, e.y-2, 4, 4);
  ctx.fillRect(sx+16, e.y-2, 4, 4);
  ctx.shadowBlur = 0;
}

function drawArmor(e) {
  const sx = e.x - cameraX;
  ctx.fillStyle = '#555';
  ctx.beginPath();
  ctx.ellipse(sx+e.w/2, e.y+e.h/2, e.w/2, e.h/2, 0, 0, Math.PI*2);
  ctx.fill();
}

function drawPowerup(pu) {
  const sx = pu.x - cameraX;
  if (pu.type === 'potion') {
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(sx+4, pu.y+8, pu.w-8, pu.h-8);
  } else {
    ctx.fillStyle = '#ff8800';
    ctx.fillRect(sx+4, pu.y+8, pu.w-8, pu.h-8);
    ctx.fillStyle = '#ffff00';
    ctx.font = '12px monospace';
    ctx.fillText('✦', sx+pu.w/2-6, pu.y+18);
  }
}

function drawHero() {
  const sx = (hero.x - cameraX) + (Math.random() - 0.5) * screenShake;
  const sy = hero.y + (Math.random() - 0.5) * screenShake;
  const flip = !hero.facingRight;

  ctx.save();
  ctx.translate(flip ? sx + hero.w : sx, sy);
  if (flip) ctx.scale(-1, 1);

  if (hero.starTimer > 0 && Math.floor(Date.now()/80) % 2) {
    ctx.fillStyle = '#ff0';
    ctx.globalAlpha = 0.5;
    ctx.fillRect(0, 0, hero.w, hero.h);
    ctx.globalAlpha = 1;
  }

  const h = hero.h;
  
  // Cape
  ctx.fillStyle = '#3a0070';
  ctx.fillRect(4, 0, 20, 12);
  ctx.fillStyle = '#5a20a0';
  ctx.fillRect(2, 10, 24, 10);
  
  // Face
  ctx.fillStyle = '#ffccaa';
  ctx.fillRect(8, 12, 6, 4);
  ctx.fillRect(16, 12, 6, 4);
  ctx.fillStyle = '#4400ff';
  ctx.shadowColor = '#4400ff';
  ctx.shadowBlur = 6;
  ctx.fillRect(9, 13, 4, 3);
  ctx.fillRect(17, 13, 4, 3);
  ctx.shadowBlur = 0;
  
  // Body
  ctx.fillStyle = '#3a0070';
  ctx.fillRect(4, 20, 20, 8);
  ctx.fillStyle = '#1a0040';
  ctx.fillRect(4, 22, 20, Math.min(10, h - 22));
  
  // Sword (if attacking)
  if (hero.attacking) {
    ctx.fillStyle = '#ddd';
    ctx.fillRect(28, 10, 16, 3);
    ctx.fillRect(40, 8, 4, 7);
  }
  
  // Boots
  ctx.fillStyle = '#5a20a0';
  if (h === 32) {
    if (hero.walkFrame === 0) { ctx.fillRect(4, 28, 8, 4); ctx.fillRect(16, 28, 8, 4); }
    else if (hero.walkFrame === 1) { ctx.fillRect(4, 26, 8, 6); ctx.fillRect(18, 28, 8, 4); }
    else { ctx.fillRect(2, 24, 10, 8); ctx.fillRect(16, 28, 10, 4); }
  } else {
    ctx.fillRect(4, 38, 12, 10);
    ctx.fillRect(16, 38, 12, 10);
  }

  ctx.restore();
}

function drawProjectiles() {
  for (const p of projectiles) {
    const sx = p.x - cameraX;
    if (p.type === 'fireball') {
      ctx.fillStyle = '#ff4400';
      ctx.shadowColor = '#ff4400';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(sx + p.w/2, p.y + p.h/2, p.w/2, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
    } else if (p.type === 'meteor') {
      ctx.fillStyle = '#ff6600';
      ctx.shadowColor = '#ff6600';
      ctx.shadowBlur = 18;
      ctx.beginPath();
      ctx.arc(sx + p.w/2, p.y + p.h/2, p.w/2, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
      // Trail
      ctx.fillStyle = '#ffaa00';
      ctx.beginPath();
      ctx.arc(sx + p.w/2, p.y + p.h/2, p.w/3, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

function drawWeather() {
  for (const p of weather.particles) {
    const alpha = p.life / 150;
    ctx.fillStyle = `rgba(200,200,255,${alpha * 0.6})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life/p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - cameraX - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  for (const t of floatingTexts) {
    const alpha = t.life/60;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = t.color;
    ctx.fillText(t.text, t.x - cameraX, t.y);
  }
  ctx.globalAlpha = 1;
}

function drawMinimap() {
  minimapCtx.clearRect(0, 0, 180, 100);
  minimapCtx.fillStyle = 'rgba(0,0,0,0.8)';
  minimapCtx.fillRect(0, 0, 180, 100);
  
  const scaleX = 180 / WORLD.width;
  const scaleY = 100 / WORLD.groundY;
  
  // Platforms
  for (const p of platforms) {
    minimapCtx.fillStyle = p.type === 'crystal' ? '#ff00ff' : '#444';
    minimapCtx.fillRect(p.x * scaleX, p.y * scaleY, Math.max(p.w * scaleX, 1), 2);
  }
  
  // Gems
  minimapCtx.fillStyle = '#ffd700';
  for (const g of gemItems) {
    if (!g.collected) minimapCtx.fillRect(g.x * scaleX, g.y * scaleY, 2, 2);
  }
  
  // Hero
  minimapCtx.fillStyle = '#00ff00';
  minimapCtx.fillRect(hero.x * scaleX - 1, hero.y * scaleY - 1, 4, 4);
  
  // Flag
  minimapCtx.fillStyle = '#ff00ff';
  minimapCtx.fillRect(FLAG_POLE.x * scaleX, FLAG_POLE.y * scaleY, 2, 8);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();
  drawWeather();
  drawFlagPole();
  drawGems();
  for (const pu of powerups) { if (pu.alive) drawPowerup(pu); }
  drawPlatforms();
  drawPipes();
  for (const e of enemies) {
    if (!e.alive) continue;
    if (e.type === 'shadow') drawShadow(e);
    else if (e.type === 'knight') drawKnight(e);
    else if (e.type === 'armor') drawArmor(e);
  }
  drawProjectiles();
  drawHero();
  drawParticles();
  drawMinimap();
}

function gameLoop() {
  if (!gameRunning) return;
  musicSystem.update();
  updateWeather();
  updateHero();
  updateEnemies();
  updateParticles();
  draw();
  gameLoopId = requestAnimationFrame(gameLoop);
}

function startGame() {
  initAudio();
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('game-over-screen').classList.add('hidden');
  score = 0; gems = 0; lives = 3; timeLeft = 300;
  updateHUD();
  document.getElementById('lives-display').textContent = 'x03';
  document.getElementById('time-display').textContent = '300';
  document.getElementById('combo-display').classList.add('hidden');
  
  // Reset achievements
  Object.values(ACHIEVEMENTS).forEach(a => a.unlocked = false);
  
  initGame();
  gameRunning = true;
  musicSystem.switchTrack('main');
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!gameRunning) return;
    timeLeft = Math.max(0, timeLeft-1);
    document.getElementById('time-display').textContent = timeLeft;
    if (timeLeft === 0 && !hero.dead) {
      hero.dead = true; hero.vy = -10; hero.deathTimer = 0;
    }
  }, 1000);
  if (gameLoopId) cancelAnimationFrame(gameLoopId);
  gameLoop();
}

function gameOver() {
  gameRunning = false;
  if (timerInterval) clearInterval(timerInterval);
  
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('shadowQuestHighScore', highScore);
  }
  
  document.getElementById('game-over-screen').classList.remove('hidden');
  document.getElementById('final-score').innerHTML = `
    🏆 SCORE: ${String(score).padStart(6,'0')}<br>
    💎 RUBIS: ${gems}<br>
    📊 RECORD: ${String(highScore).padStart(6,'0')}<br>
    ⭐ NIVEAU: ${heroLevel}
  `;
}

function restartGame() { startGame(); }

function setupMobileControls() {
  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768;
  const mobileControls = document.getElementById('mobile-controls');
  
  if (isMobile) mobileControls.style.display = 'flex';
  
  const btnLeft = document.getElementById('btn-left');
  const btnRight = document.getElementById('btn-right');
  const btnJump = document.getElementById('btn-jump');
  const btnAttack = document.getElementById('btn-attack');
  
  const addListeners = (btn, key) => {
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
    btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
    btn.addEventListener('mousedown', () => keys[key] = true);
    btn.addEventListener('mouseup', () => keys[key] = false);
    btn.addEventListener('mouseleave', () => keys[key] = false);
  };
  
  addListeners(btnLeft, 'ArrowLeft');
  addListeners(btnRight, 'ArrowRight');
  addListeners(btnJump, ' ');
  addListeners(btnAttack, 'x');
}

document.getElementById('start-btn').addEventListener('click', startGame);

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ([' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

window.addEventListener('resize', () => {
  resizeCanvas();
  setupMobileControls();
});

setupMobileControls();

const cw = canvas.width;
const ch = canvas.height;
ctx.fillStyle = '#0a0a1e';
ctx.fillRect(0, 0, cw, ch);
</script>
