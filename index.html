<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Time Traveler Tim</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#06040c;
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; overflow:hidden;
  font-family:'Courier New',monospace;
}
canvas { display:block; box-shadow: 0 0 0 1px #1a1030, 0 0 60px rgba(120,60,255,0.2); }
</style>
</head>
<body>
<canvas id="c" width="800" height="600"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const CW=800,CH=600,WW=3400;
let screen='start',gT=0,lastTime=0;

const TH={
  past:{skyT:'#110808',skyM:'#2d1408',skyB:'#1a0c04',ground:'#4a2e10',
    platT:'#7a5228',platB:'#5c3d18',platS:'#2e1a08',
    acc:'#e8a030',aR:232,aG:160,aB:48,fog:'rgba(180,90,20,',
    colR:255,colG:208,colB:64,col:'#ffd040',par:'#e8902a'},
  future:{skyT:'#020510',skyM:'#041228',skyB:'#020814',ground:'#071828',
    platT:'#1a4060',platB:'#0c2235',platS:'#040e18',
    acc:'#00e5ff',aR:0,aG:229,aB:255,fog:'rgba(0,100,200,',
    colR:0,colG:255,colB:200,col:'#00ffc8',par:'#0080ff'}
};

const BONUS_COL={speed:'#ffcc00',jump:'#aa44ff',shield:'#44ddff',magnet:'#ff6622'};
const BONUS_ICO={speed:'⚡',jump:'🌀',shield:'🛡',magnet:'🧲'};
const BONUS_LBL={speed:'VITESSE x1.5',jump:'SUPER SAUT',shield:'BOUCLIER',magnet:'AIMANT'};
const BONUS_DUR=300;

const PLAT_DEF=[
  {x:0,y:545,w:3400,h:55,era:'both',type:'ground'},
  {x:80,y:440,w:160,h:18,era:'past',type:'stone'},
  {x:290,y:370,w:130,h:18,era:'both',type:'stone'},
  {x:470,y:295,w:170,h:18,era:'past',type:'stone'},
  {x:690,y:355,w:140,h:18,era:'future',type:'metal'},
  {x:880,y:445,w:110,h:18,era:'both',type:'stone'},
  {x:1040,y:360,w:150,h:18,era:'past',type:'stone'},
  {x:1240,y:280,w:130,h:18,era:'future',type:'holo'},
  {x:1420,y:350,w:140,h:18,era:'both',type:'stone'},
  {x:1610,y:260,w:200,h:18,era:'past',type:'stone'},
  {x:1870,y:410,w:180,h:18,era:'future',type:'conveyor',dir:1},
  {x:2100,y:330,w:140,h:18,era:'future',type:'holo'},
  {x:2070,y:460,w:160,h:18,era:'past',type:'stone'},
  {x:2280,y:265,w:130,h:18,era:'both',type:'stone'},
  {x:2450,y:350,w:160,h:18,era:'future',type:'conveyor',dir:-1},
  {x:2440,y:410,w:150,h:18,era:'past',type:'stone'},
  {x:2660,y:285,w:130,h:18,era:'both',type:'stone'},
  {x:2840,y:205,w:210,h:18,era:'future',type:'holo'},
  {x:2860,y:370,w:150,h:18,era:'past',type:'stone'},
  {x:3070,y:255,w:130,h:18,era:'both',type:'stone'},
  {x:3240,y:180,w:120,h:18,era:'future',type:'holo'},
];

const COL_DEF=[
  {x:165,y:408,era:'past',t:0},{x:355,y:338,era:'both',t:0.8},
  {x:555,y:262,era:'past',t:1.6},{x:760,y:322,era:'future',t:2.4},
  {x:1090,y:328,era:'past',t:0.3},{x:1305,y:248,era:'future',t:1.1},
  {x:1660,y:228,era:'past',t:2.0},{x:1940,y:378,era:'future',t:0.6},
  {x:2145,y:298,era:'future',t:1.4},{x:2325,y:233,era:'both',t:2.2},
  {x:2705,y:253,era:'both',t:0.9},{x:2920,y:173,era:'future',t:1.7},
];

const BON_DEF=[
  {x:400,y:255,era:'past',type:'speed'},{x:1150,y:260,era:'future',type:'jump'},
  {x:1700,y:240,era:'past',type:'shield'},{x:2200,y:245,era:'future',type:'magnet'},
  {x:2760,y:265,era:'both',type:'speed'},{x:3100,y:225,era:'future',type:'jump'},
];

const ENE_DEF=[
  {x:430,y:520,w:30,h:26,era:'past',type:'scarab',vx:1.3,range:130,startX:370},
  {x:940,y:418,w:26,h:30,era:'past',type:'plant',vx:0,range:0,startX:940},
  {x:1090,y:338,w:30,h:26,era:'past',type:'scarab',vx:1.6,range:110,startX:1040},
  {x:1900,y:388,w:34,h:28,era:'future',type:'drone',vx:2.1,range:150,startX:1875},
  {x:2490,y:328,w:30,h:30,era:'future',type:'robot',vx:1.9,range:130,startX:2450},
  {x:2720,y:520,w:30,h:26,era:'both',type:'scarab',vx:1.4,range:110,startX:2670},
  {x:3150,y:232,w:30,h:26,era:'future',type:'drone',vx:2.5,range:120,startX:3080},
];

const MIS_DEF=[
  {id:'col5',label:'Collectionneur',desc:'Ramasse 5 fragments',goal:5,type:'collect',reward:50},
  {id:'colAll',label:'Archiviste',desc:'Tous les fragments',goal:12,type:'collect',reward:200},
  {id:'sw10',label:'Voyageur',desc:'10 switches temporels',goal:10,type:'switch',reward:80},
  {id:'bon3',label:'Power Hunter',desc:'Active 3 bonus',goal:3,type:'bonus',reward:60},
  {id:'nokill',label:'Fantôme',desc:'Atteins x=2000 vivant',goal:1,type:'nokill',reward:150},
  {id:'speed',label:'Speedrunner',desc:'Termine en <3 min',goal:1,type:'speedrun',reward:300},
];

// Décors bg
const STARS=Array.from({length:90},()=>({x:Math.random()*WW,y:Math.random()*420,s:Math.random()*2+0.4,t:Math.random()*Math.PI*2}));
const RUINS=Array.from({length:24},()=>({x:Math.random()*WW,y:280+Math.random()*220,w:16+Math.random()*60,h:40+Math.random()*130,lay:0.25+Math.random()*0.45}));
const TECH=Array.from({length:18},()=>({x:Math.random()*WW,y:80+Math.random()*320,w:28+Math.random()*55,h:70+Math.random()*220,lay:0.25+Math.random()*0.45,p:Math.random()*Math.PI*2}));

// State
let P,enemies,bonuses,cols,missions,parts,cam;

function mkP(){
  return {x:80,y:490,w:28,h:42,vx:0,vy:0,onGround:false,facing:1,
    era:'past',swCd:0,score:0,totalScore:0,dead:false,dTimer:0,
    bonus:null,bonusT:0,wFrame:0,wTimer:0,jumpA:0,swA:0,tailA:0,
    swCount:0,bonCount:0,dCount:0,startT:0,notifs:[],combo:0,comboT:0};
}

function init(){
  P=mkP();P.startT=Date.now();
  enemies=ENE_DEF.map(e=>({...e,floatY:e.y,floatT:0}));
  bonuses=BON_DEF.map(b=>({...b,collected:false}));
  cols=COL_DEF.map(c=>({...c,collected:false}));
  missions=MIS_DEF.map(m=>({...m,progress:0,done:false}));
  parts=[];
  cam={x:0,y:0};
  screen='playing';
}

// Input
const keys={},jp={};
document.addEventListener('keydown',e=>{if(!keys[e.code])jp[e.code]=true;keys[e.code]=true;if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
function consume(c){if(jp[c]){delete jp[c];return true;}return false;}

function ov(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function platE(era){return PLAT_DEF.filter(p=>p.era==='both'||p.era===era);}
function canSw(){const ne=P.era==='past'?'future':'past';const box={x:P.x,y:P.y,w:P.w,h:P.h};return!platE(ne).some(p=>ov(box,p));}

function spawnP(x,y,col,n,sp,upB=1){for(let i=0;i<n;i++)parts.push({x,y,vx:(Math.random()-0.5)*sp,vy:(Math.random()-upB)*sp*0.9,life:1,decay:0.025+Math.random()*0.04,size:2+Math.random()*5,col});}
function spawnTxt(x,y,txt,col){parts.push({isTxt:true,x,y,vy:-1.5,life:1,decay:0.018,txt,col,size:14});}

function tickM(type){
  for(const m of missions){
    if(m.done)continue;
    if(m.type===type){
      if(type==='collect')m.progress=P.score;
      else if(type==='nokill'){if(P.x>2000&&P.dCount===0)m.progress=1;}
      else m.progress=Math.min(m.goal,m.progress+1);
      if(m.progress>=m.goal&&!m.done){
        m.done=true;P.totalScore+=m.reward;
        P.notifs.push({txt:'Mission: '+m.label+' +'+m.reward+'pts',timer:200,col:'#ffd700'});
        spawnTxt(P.x+P.w/2,P.y-30,'+'+m.reward,'#ffd700');
      }
    }
  }
}

function updateP(){
  if(P.dead){P.dTimer--;if(P.dTimer<=0)respawn();return;}
  const sp=P.bonus==='speed'?1.55:1,jp2=P.bonus==='jump'?1.35:1,mag=P.bonus==='magnet';
  let mv=false;
  if(keys['ArrowLeft']||keys['KeyA']){P.vx=-4.6*sp;P.facing=-1;mv=true;}
  else if(keys['ArrowRight']||keys['KeyD']){P.vx=4.6*sp;P.facing=1;mv=true;}
  else P.vx*=0.72;
  if((consume('ArrowUp')||consume('Space')||consume('KeyW'))&&P.onGround){
    P.vy=-13.8*jp2;P.onGround=false;P.jumpA=1;
    spawnP(P.x+P.w/2,P.y+P.h,TH[P.era].par,8,4);
  }
  if(consume('KeyE')){
    if(P.swCd>0||!canSw()){P.swA=-0.8;if(!canSw())P.notifs.push({txt:'SWITCH BLOQUÉ!',timer:60,col:'#ff4444'});}
    else{P.era=P.era==='past'?'future':'past';P.swCd=30;P.swA=1;P.swCount++;spawnP(P.x+P.w/2,P.y+P.h/2,TH[P.era].par,24,7);tickM('switch');}
  }
  if(P.swCd>0)P.swCd--;
  if(P.jumpA>0)P.jumpA-=0.07;
  if(P.swA>0)P.swA-=0.055;if(P.swA<0)P.swA+=0.10;
  P.tailA+=0.12;
  if(P.bonusT>0){P.bonusT--;if(P.bonusT<=0)P.bonus=null;}
  if(P.comboT>0)P.comboT--;else P.combo=0;
  P.vy+=0.56;if(P.vy>18)P.vy=18;
  if(mv&&P.onGround){P.wTimer++;if(P.wTimer>7){P.wTimer=0;P.wFrame=(P.wFrame+1)%8;}}else{P.wFrame=0;P.wTimer=0;}
  const plats=platE(P.era);
  for(const p of plats)if(p.type==='conveyor'){const feet={x:P.x,y:P.y+P.h-2,w:P.w,h:4};if(ov(feet,p))P.vx+=p.dir*0.9;}
  P.x+=P.vx;P.x=Math.max(0,Math.min(WW-P.w,P.x));
  P.onGround=false;
  for(const p of plats)if(ov({x:P.x,y:P.y,w:P.w,h:P.h},p)){if(P.vx>0)P.x=p.x-P.w;else if(P.vx<0)P.x=p.x+p.w;P.vx=0;}
  P.y+=P.vy;
  for(const p of plats)if(ov({x:P.x,y:P.y,w:P.w,h:P.h},p)){if(P.vy>0){P.y=p.y-P.h;P.vy=0;P.onGround=true;}else if(P.vy<0){P.y=p.y+p.h;P.vy=0;}}
  if(P.y>CH+120){die();return;}

  // Collectibles
  for(const c of cols){
    if(c.collected)continue;
    if(c.era!=='both'&&c.era!==P.era&&!mag)continue;
    if(mag&&Math.hypot(c.x-P.x-P.w/2,c.y-P.y-P.h/2)<90){c.x+=(P.x+P.w/2-c.x)*0.12;c.y+=(P.y+P.h/2-c.y)*0.12;}
    if(ov({x:P.x,y:P.y,w:P.w,h:P.h},{x:c.x-10,y:c.y-10,w:20,h:20})){
      c.collected=true;P.score++;P.combo++;P.comboT=90;
      const pts=10*(P.combo>1?P.combo:1);P.totalScore+=pts;
      spawnP(c.x,c.y,TH[P.era].col,16,6);
      spawnTxt(c.x,c.y-10,P.combo>1?'x'+P.combo+' COMBO!':'+'+pts,TH[P.era].col);
      tickM('collect');tickM('nokill');
    }
  }

  // Bonus
  for(const b of bonuses){
    if(b.collected)continue;
    if(b.era!=='both'&&b.era!==P.era)continue;
    if(ov({x:P.x,y:P.y,w:P.w,h:P.h},{x:b.x-14,y:b.y-14,w:28,h:28})){
      b.collected=true;P.bonus=b.type;P.bonusT=BONUS_DUR;P.bonCount++;P.totalScore+=30;
      spawnP(b.x,b.y,BONUS_COL[b.type],20,7);
      spawnTxt(b.x,b.y-16,BONUS_ICO[b.type]+' '+BONUS_LBL[b.type],BONUS_COL[b.type]);
      P.notifs.push({txt:BONUS_ICO[b.type]+' '+BONUS_LBL[b.type],timer:180,col:BONUS_COL[b.type]});
      tickM('bonus');
    }
  }

  // Enemies
  for(const e of enemies){
    if(e.era!=='both'&&e.era!==P.era)continue;
    if(ov({x:P.x,y:P.y,w:P.w,h:P.h},e)){
      if(P.bonus==='shield'){P.bonus=null;P.bonusT=0;spawnP(P.x+P.w/2,P.y+P.h/2,'#44ddff',30,8);spawnTxt(P.x+P.w/2,P.y-20,'BOUCLIER BRISÉ!','#44ddff');}
      else{die();return;}
    }
  }

  for(let i=P.notifs.length-1;i>=0;i--){P.notifs[i].timer--;if(P.notifs[i].timer<=0)P.notifs.splice(i,1);}
  if(P.x>3350&&screen==='playing'){
    const el=(Date.now()-P.startT)/1000;
    if(el<180){const sm=missions.find(m=>m.id==='speed');if(sm&&!sm.done){sm.progress=1;sm.done=true;P.totalScore+=sm.reward;P.notifs.push({txt:'Mission: Speedrunner +'+sm.reward+'pts',timer:300,col:'#ffd700'});}}
    screen='win';
  }
}

function updEnemies(){
  for(const e of enemies){
    if(e.type==='plant')continue;
    e.x+=e.vx;if(e.x>e.startX+e.range||e.x<e.startX-e.range)e.vx*=-1;
    if(e.type==='drone'){e.floatT+=0.04;e.y=e.floatY+Math.sin(e.floatT)*22;}
  }
}

function die(){
  if(P.dead)return;P.dead=true;P.dTimer=100;P.dCount++;
  spawnP(P.x+P.w/2,P.y+P.h/2,TH[P.era].par,35,9,1.5);screen='dead';
}

function respawn(){
  P.dead=false;P.x=80;P.y=490;P.vx=0;P.vy=0;P.era='past';P.swCd=0;P.swA=0;P.bonus=null;P.bonusT=0;screen='playing';
}

function updParts(){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    if(p.isTxt){p.y+=p.vy;p.life-=p.decay;if(p.life<=0)parts.splice(i,1);continue;}
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=p.decay;if(p.life<=0)parts.splice(i,1);
  }
}

function updCam(){
  cam.x+=(P.x-CW/2+P.w/2-cam.x)*0.1;
  cam.y+=(P.y-CH/2+P.h/2-cam.y)*0.1;
  cam.x=Math.max(0,Math.min(WW-CW,cam.x));cam.y=0;
}

// ── DRAW START ──
function drawStart(){
  const g=ctx.createLinearGradient(0,0,0,CH);
  g.addColorStop(0,'#06020e');g.addColorStop(0.5,'#100518');g.addColorStop(1,'#06020e');
  ctx.fillStyle=g;ctx.fillRect(0,0,CW,CH);
  ctx.strokeStyle='rgba(80,40,160,0.07)';ctx.lineWidth=1;
  for(let x=0;x<CW;x+=50){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke();}
  for(let y=0;y<CH;y+=50){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();}

  // Portail central
  const cx=CW/2,cy=175,pr=72;
  for(let r=0;r<3;r++){
    const rd=pr+r*18,al=(0.12-r*0.03)+Math.sin(gT*0.04+r)*0.04;
    ctx.beginPath();ctx.arc(cx,cy,rd,0,Math.PI*2);
    ctx.strokeStyle=r===0?`rgba(200,160,255,${al})`:`rgba(0,200,255,${al})`;
    ctx.lineWidth=r===0?2:1;ctx.stroke();
    for(let d=0;d<4;d++){
      const a=d/4*Math.PI*2+gT*0.02*(r%2===0?1:-1);
      const ga=0.4+Math.sin(gT*0.05+d+r)*0.3;
      ctx.beginPath();ctx.arc(cx+Math.cos(a)*rd,cy+Math.sin(a)*rd,3,0,Math.PI*2);
      ctx.fillStyle=r===0?`rgba(255,200,100,${ga})`:`rgba(0,230,255,${ga})`;ctx.fill();
    }
  }
  const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,pr);
  cg.addColorStop(0,`rgba(140,60,255,${0.35+Math.sin(gT*0.06)*0.08})`);
  cg.addColorStop(0.6,`rgba(40,0,120,0.15)`);cg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=cg;ctx.beginPath();ctx.arc(cx,cy,pr,0,Math.PI*2);ctx.fill();
  // Tim miniature
  drawMiniTim(cx,cy);

  // Titre
  ctx.shadowColor='rgba(180,100,255,0.8)';ctx.shadowBlur=30;
  ctx.textAlign='center';
  const tg=ctx.createLinearGradient(cx-220,0,cx+220,0);
  tg.addColorStop(0,'#e8a030');tg.addColorStop(0.4,'#ffffff');
  tg.addColorStop(0.7,'#00e5ff');tg.addColorStop(1,'#aa66ff');
  ctx.font='bold 46px "Courier New"';ctx.fillStyle=tg;ctx.fillText('TIME TRAVELER',cx,285);
  ctx.font='bold 62px "Courier New"';ctx.fillText('TIM',cx,345);
  ctx.shadowBlur=0;
  ctx.font='11px "Courier New"';ctx.fillStyle='rgba(180,140,255,0.6)';ctx.fillText('— VOYAGEUR DES ÈRES —',cx,370);

  // Bouton JOUER
  const bw=230,bh=52,bx=cx-bw/2,by=408;
  const pp=Math.sin(gT*0.07)*0.3+0.7;
  ctx.shadowColor='rgba(0,220,255,0.6)';ctx.shadowBlur=20*pp;
  const bg=ctx.createLinearGradient(bx,by,bx,by+bh);
  bg.addColorStop(0,'rgba(0,180,255,0.22)');bg.addColorStop(1,'rgba(0,80,160,0.12)');
  ctx.fillStyle=bg;ctx.beginPath();ctx.roundRect(bx,by,bw,bh,10);ctx.fill();
  ctx.strokeStyle=`rgba(0,220,255,${pp})`;ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(bx,by,bw,bh,10);ctx.stroke();
  ctx.shadowBlur=0;
  ctx.font=`bold 22px "Courier New"`;ctx.fillStyle=`rgba(0,230,255,${0.8+pp*0.2})`;ctx.fillText('▶  JOUER',cx,by+34);

  // Contrôles
  ctx.font='10px "Courier New"';ctx.fillStyle='rgba(120,100,160,0.75)';
  ctx.fillText('← →  DÉPLACER   ·   ↑ ESPACE  SAUTER   ·   E  SWITCH TEMPOREL',cx,478);

  // Features
  const feats=['◈ Collecte fragments & data chips','⚡ Active des bonus power-up','⏱ Switch entre passé & futur','★ Accomplis 6 missions secrètes'];
  ctx.font='10px "Courier New"';
  for(let i=0;i<feats.length;i++){
    const fc=i%2===0?'rgba(200,160,80,0.55)':'rgba(0,200,255,0.55)';
    ctx.fillStyle=fc;ctx.fillText(feats[i],cx,500+i*18);
  }

  if(consume('Space')||consume('Enter'))init();
}

function drawMiniTim(cx,cy){
  ctx.save();ctx.translate(cx,cy);
  const bob=Math.sin(gT*0.05)*3;
  // Corps
  ctx.fillStyle='#e8c870';ctx.fillRect(-6,-10+bob,12,16);
  // Tête
  ctx.beginPath();ctx.arc(0,-16+bob,9,0,Math.PI*2);ctx.fill();
  // Chapeau
  ctx.fillStyle='#7a4218';ctx.fillRect(-8,-28+bob,16,10);
  ctx.fillStyle='#5a3010';ctx.fillRect(-10,-20+bob,20,4);
  // Plume
  ctx.fillStyle='#c8a030';ctx.beginPath();ctx.moveTo(6,-28+bob);ctx.quadraticCurveTo(14,-42+bob,10,-22+bob);ctx.closePath();ctx.fill();
  // Cape
  const cs=Math.sin(gT*0.06)*4;
  ctx.fillStyle='#6a3010';ctx.beginPath();ctx.moveTo(-6,-10+bob);ctx.quadraticCurveTo(-14+cs,0+bob,-8+cs*0.7,10+bob);ctx.lineTo(-2,8+bob);ctx.closePath();ctx.fill();
  // Bâton
  ctx.strokeStyle='#6a3810';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(-8,4+bob);ctx.lineTo(-14,18+bob);ctx.stroke();
  ctx.fillStyle='#e8a030';ctx.beginPath();ctx.arc(-15,20+bob,5,0,Math.PI*2);ctx.fill();
  // Yeux
  ctx.fillStyle='#1a0800';ctx.beginPath();ctx.ellipse(3,-17+bob,2.5,3,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(4,-18+bob,1,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// ── DRAW TIM (personnage principal) ──
function drawTim(th){
  if(P.dead)return;
  const sx=P.x-cam.x,sy=P.y-cam.y,cx=sx+P.w/2,cy=sy+P.h/2;

  // Ombre sol
  if(P.onGround){ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.ellipse(cx,sy+P.h+3,P.w*0.5,4,0,0,Math.PI*2);ctx.fill();}

  // Aura switch
  if(P.swA>0){
    const au=ctx.createRadialGradient(cx,cy,0,cx,cy,52*P.swA);
    au.addColorStop(0,`rgba(${th.aR},${th.aG},${th.aB},${P.swA*0.5})`);au.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=au;ctx.beginPath();ctx.arc(cx,cy,52,0,Math.PI*2);ctx.fill();
    for(let r=0;r<2;r++){
      ctx.beginPath();ctx.arc(cx,cy,(1-P.swA)*42+r*22,0,Math.PI*2);
      ctx.strokeStyle=`rgba(${th.aR},${th.aG},${th.aB},${P.swA*(0.6-r*0.2)})`;ctx.lineWidth=2;ctx.stroke();
    }
  } else if(P.swA<0){
    ctx.fillStyle=`rgba(255,60,60,${-P.swA*0.3})`;ctx.beginPath();ctx.arc(cx,cy,28,0,Math.PI*2);ctx.fill();
  }

  // Bouclier
  if(P.bonus==='shield'){
    const sa=0.5+Math.sin(gT*0.08)*0.3;
    ctx.beginPath();ctx.arc(cx,cy,30,0,Math.PI*2);
    ctx.strokeStyle=`rgba(68,221,255,${sa})`;ctx.lineWidth=3;ctx.stroke();
    ctx.fillStyle=`rgba(68,221,255,${sa*0.1})`;ctx.fill();
  }

  ctx.save();ctx.translate(cx,cy);if(P.facing===-1)ctx.scale(-1,1);

  const hw=P.w/2,hh=P.h/2;
  const isM=Math.abs(P.vx)>0.5;
  const legSw=isM&&P.onGround?Math.sin(P.wFrame/8*Math.PI*2)*8:0;
  const armSw=isM&&P.onGround?Math.sin(P.wFrame/8*Math.PI*2+Math.PI)*6:(!P.onGround?(P.vy>0?6:-4):0);
  const bodyY=-hh+P.h*0.22,bodyH=P.h*0.5;
  const headY=-hh+11;

  // JAMBES
  const lc=P.era==='past'?'#5a3010':'#0a2040';
  const lc2=P.era==='past'?'#7a4818':'#0d2a50';
  ctx.fillStyle=lc;ctx.beginPath();ctx.roundRect(hw/2-2,-hh+P.h*0.58-legSw,8,16,3);ctx.fill();
  ctx.fillStyle=lc2;ctx.beginPath();ctx.roundRect(-hw+3,-hh+P.h*0.58+legSw,8,16,3);ctx.fill();
  // Pieds
  const fc=P.era==='past'?'#3a2008':'#06101a';
  ctx.fillStyle=fc;
  ctx.beginPath();ctx.roundRect(-hw+1,-hh+P.h*0.58+legSw+14,12,5,2);ctx.fill();
  ctx.beginPath();ctx.roundRect(hw/2-4,-hh+P.h*0.58-legSw+14,12,5,2);ctx.fill();

  // CAPE
  const cs=Math.sin(P.tailA)*5+P.vx*2;
  if(P.era==='past'){
    ctx.fillStyle='#6a3010';
    ctx.beginPath();ctx.moveTo(-hw,bodyY);
    ctx.quadraticCurveTo(-hw-10+cs,0,-hw-5+cs*0.8,hh+4);
    ctx.lineTo(-hw+8,hh-4);ctx.lineTo(-hw+6,bodyY+8);ctx.closePath();ctx.fill();
    ctx.strokeStyle='#c8802a';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-hw,bodyY);
    ctx.quadraticCurveTo(-hw-10+cs,0,-hw-5+cs*0.8,hh+4);ctx.stroke();
    ctx.fillStyle='rgba(200,128,40,0.35)';ctx.font='8px monospace';ctx.textAlign='center';ctx.fillText('ᚱ',-hw-1,5);
  } else {
    ctx.fillStyle='#060c18';
    ctx.beginPath();ctx.moveTo(-hw+2,bodyY);
    ctx.quadraticCurveTo(-hw-8+cs,2,-hw-3+cs*0.9,hh+6);
    ctx.lineTo(-hw+7,hh-2);ctx.lineTo(-hw+6,bodyY+8);ctx.closePath();ctx.fill();
    ctx.strokeStyle=`rgba(0,200,255,${0.6+Math.sin(gT*0.07)*0.3})`;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-hw+2,bodyY);
    ctx.quadraticCurveTo(-hw-8+cs,2,-hw-3+cs*0.9,hh+6);ctx.stroke();
  }

  // CORPS
  if(P.era==='past'){
    ctx.fillStyle='#b06820';ctx.beginPath();ctx.roundRect(-hw+2,bodyY,P.w-4,bodyH,3);ctx.fill();
    ctx.fillStyle='#8a4e18';ctx.fillRect(-hw+4,bodyY+4,P.w-8,4);
    ctx.fillStyle='#4a2a0a';ctx.fillRect(-hw+2,bodyY+bodyH*0.55,P.w-4,6);
    ctx.fillStyle='#e8a030';ctx.beginPath();ctx.arc(0,bodyY+bodyH*0.55+3,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,200,100,0.12)';ctx.beginPath();ctx.roundRect(-hw+2,bodyY,P.w*0.4,bodyH*0.4,2);ctx.fill();
  } else {
    ctx.fillStyle='#0d1e35';ctx.beginPath();ctx.roundRect(-hw+2,bodyY,P.w-4,bodyH,3);ctx.fill();
    const pp=0.5+Math.sin(gT*0.06)*0.3;
    ctx.fillStyle=`rgba(0,180,255,${0.12*pp})`;ctx.beginPath();ctx.roundRect(-hw+5,bodyY+4,P.w-10,bodyH*0.45,2);ctx.fill();
    ctx.strokeStyle=`rgba(0,210,255,${0.4+pp*0.2})`;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(-hw+6,bodyY+8);ctx.lineTo(hw-6,bodyY+8);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-hw+8,bodyY+14);ctx.lineTo(hw-8,bodyY+14);ctx.stroke();
    ctx.fillStyle=`rgba(0,255,200,${0.8+pp*0.2})`;ctx.beginPath();ctx.arc(0,bodyY+20,3,0,Math.PI*2);ctx.fill();
    if(P.bonus){ctx.fillStyle=BONUS_COL[P.bonus]+'33';ctx.beginPath();ctx.roundRect(-hw+2,bodyY,P.w-4,bodyH,3);ctx.fill();}
  }

  // BRAS + objet
  const ac=P.era==='past'?'#8a5018':'#0a1828';
  // Bras arrière
  ctx.fillStyle=ac;ctx.save();ctx.translate(hw-3,bodyY+4+7);ctx.rotate(-armSw*0.06);
  ctx.beginPath();ctx.roundRect(-3,-7,6,14,3);ctx.fill();
  ctx.fillStyle=P.era==='past'?'#c8802a':'#1a3a5a';ctx.beginPath();ctx.arc(0,7+3,4,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // Bras avant
  ctx.fillStyle=P.era==='past'?'#a06028':'#0d2238';
  ctx.save();ctx.translate(-hw+3,bodyY+4+7);ctx.rotate(armSw*0.06);
  ctx.beginPath();ctx.roundRect(-3,-7,6,14,3);ctx.fill();
  if(P.era==='past'){
    ctx.strokeStyle='#6a3810';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(0,7);ctx.lineTo(-6,21);ctx.stroke();
    ctx.fillStyle='#e8a030';ctx.beginPath();ctx.arc(-8,23,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,220,100,0.6)';ctx.beginPath();ctx.arc(-8,23,3,0,Math.PI*2);ctx.fill();
  } else {
    const gp=0.5+Math.sin(gT*0.08)*0.4;
    ctx.fillStyle=`rgba(0,200,255,${0.3+gp*0.3})`;ctx.beginPath();ctx.roundRect(-5,9,10,8,2);ctx.fill();
    ctx.strokeStyle=`rgba(0,255,255,${gp})`;ctx.lineWidth=1;ctx.strokeRect(-5,9,10,8);
    ctx.fillStyle=`rgba(0,255,200,${gp})`;ctx.fillRect(-3,11,6,4);
  }
  ctx.restore();

  // COU
  ctx.fillStyle=P.era==='past'?'#c8802a':'#1e3a5a';ctx.fillRect(-4,headY-2,8,8);

  // TÊTE
  const skin=P.era==='past'?'#e8c060':'#b0d8f0';
  ctx.fillStyle=skin;ctx.beginPath();ctx.ellipse(0,headY,10,11,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.12)';ctx.beginPath();ctx.ellipse(3,headY,4,9,0,0,Math.PI*2);ctx.fill();
  // Oreilles
  ctx.fillStyle=skin;
  ctx.beginPath();ctx.ellipse(-10,headY,3.5,4.5,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(10,headY,3.5,4.5,0,0,Math.PI*2);ctx.fill();

  if(P.era==='past'){
    // CHAPEAU EXPLORATEUR
    ctx.fillStyle='#5a3010';ctx.beginPath();ctx.ellipse(0,headY-10,16,4,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#7a4218';ctx.beginPath();ctx.roundRect(-10,headY-24,20,14,4);ctx.fill();
    ctx.fillStyle='#3a1a06';ctx.fillRect(-10,headY-12,20,4);
    // Plume
    ctx.fillStyle='#c8a030';ctx.beginPath();ctx.moveTo(8,headY-24);
    ctx.quadraticCurveTo(18,headY-40,14,headY-18);ctx.quadraticCurveTo(10,headY-30,8,headY-24);ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(255,230,100,0.5)';ctx.beginPath();ctx.moveTo(8,headY-24);
    ctx.quadraticCurveTo(14,headY-34,11,headY-20);ctx.closePath();ctx.fill();
    // Œil + sourcil + moustache
    ctx.fillStyle='#1a0800';ctx.beginPath();ctx.ellipse(4,headY-1,3,3.5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(5,headY-2,1.2,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#4a2808';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(1,headY-5);ctx.lineTo(7,headY-5.5);ctx.stroke();
    ctx.strokeStyle='#5a3010';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(-1,headY+2);ctx.quadraticCurveTo(3,headY+4,6,headY+3);ctx.stroke();
  } else {
    // CASQUE FUTURISTE
    ctx.fillStyle='#0a1525';ctx.beginPath();ctx.roundRect(-11,headY-18,22,16,5);ctx.fill();
    const vp=0.7+Math.sin(gT*0.06)*0.15;
    const vg=ctx.createLinearGradient(-9,headY-10,9,headY);
    vg.addColorStop(0,`rgba(0,200,255,${vp*0.8})`);vg.addColorStop(1,`rgba(0,100,200,${vp*0.3})`);
    ctx.fillStyle=vg;ctx.beginPath();ctx.roundRect(-9,headY-10,18,10,3);ctx.fill();
    // Scan visière
    const sc=((gT*1.5)%12)-4;
    ctx.fillStyle=`rgba(255,255,255,${0.2*vp})`;ctx.fillRect(-9,headY-10+sc,18,2);
    ctx.fillStyle=`rgba(0,180,255,0.4)`;ctx.fillRect(-11,headY-10,3,8);ctx.fillRect(8,headY-10,3,8);
    // Antenne
    ctx.strokeStyle=`rgba(0,230,255,${vp})`;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(9,headY-18);ctx.lineTo(13,headY-28);ctx.stroke();
    ctx.fillStyle=`rgba(0,255,200,${vp})`;ctx.beginPath();ctx.arc(13,headY-29,2,0,Math.PI*2);ctx.fill();
    // Œil LED
    ctx.fillStyle=`rgba(0,255,200,${vp})`;ctx.beginPath();ctx.ellipse(3,headY+1,3,2,0,0,Math.PI*2);ctx.fill();
  }

  // Trail speed
  if(P.bonus==='speed'){
    for(let t=1;t<=4;t++){ctx.fillStyle=`rgba(255,200,0,${0.12/t})`;ctx.beginPath();ctx.ellipse(-t*8*P.facing,0,P.w*0.35,P.h*0.35,0,0,Math.PI*2);ctx.fill();}
  }

  ctx.restore();

  // Barre cooldown
  if(P.swCd>0){
    const r=P.swCd/30,bw2=P.w+8,bx2=sx-4,by2=sy-10;
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.roundRect(bx2,by2,bw2,4,2);ctx.fill();
    const cg=ctx.createLinearGradient(bx2,0,bx2+bw2,0);
    cg.addColorStop(0,th.acc);cg.addColorStop(1,th.acc+'88');
    ctx.fillStyle=cg;ctx.beginPath();ctx.roundRect(bx2,by2,bw2*(1-r),4,2);ctx.fill();
  }
}

// ── DRAW BG ──
function drawBG(th){
  const g=ctx.createLinearGradient(0,0,0,CH);
  g.addColorStop(0,th.skyT);g.addColorStop(0.5,th.skyM);g.addColorStop(1,th.skyB);
  ctx.fillStyle=g;ctx.fillRect(0,0,CW,CH);
  if(P.era==='past'){
    const fg=ctx.createLinearGradient(0,380,0,CH);fg.addColorStop(0,th.fog+'0)');fg.addColorStop(1,th.fog+'0.22)');
    ctx.fillStyle=fg;ctx.fillRect(0,0,CW,CH);
    for(const r of RUINS){const sx=r.x-cam.x*r.lay;if(sx<-80||sx>CW+80)continue;ctx.fillStyle=`rgba(50,28,10,${r.lay*0.65})`;ctx.fillRect(sx,r.y,r.w,r.h);for(let c=0;c<r.w;c+=12){ctx.fillStyle=`rgba(30,15,5,${r.lay*0.85})`;ctx.fillRect(sx+c,r.y-10,7,12);}}
    for(const s of STARS){const sx=s.x-cam.x*0.08;if(sx<0||sx>CW)continue;s.t+=0.025;ctx.fillStyle=`rgba(200,160,80,${0.18+Math.sin(s.t)*0.18})`;ctx.beginPath();ctx.arc(sx,s.y,s.s,0,Math.PI*2);ctx.fill();}
  } else {
    ctx.strokeStyle='rgba(0,140,255,0.045)';ctx.lineWidth=1;
    const gs=60,ox=cam.x*0.5%gs,oy=cam.y*0.5%gs;
    for(let x=-ox;x<CW+gs;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke();}
    for(let y=-oy;y<CH+gs;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();}
    for(const t of TECH){const sx=t.x-cam.x*t.lay;if(sx<-80||sx>CW+80)continue;t.p+=0.018;const a=(0.055+Math.sin(t.p)*0.025)*t.lay;ctx.fillStyle=`rgba(0,80,180,${a})`;ctx.fillRect(sx,t.y,t.w,t.h);for(let row=0;row<t.h;row+=18)for(let col=3;col<t.w-3;col+=14){ctx.fillStyle=`rgba(0,180,255,${a*2.3})`;ctx.fillRect(sx+col,t.y+row+3,8,9);}}
    for(const s of STARS){const sx=s.x-cam.x*0.07;if(sx<0||sx>CW)continue;s.t+=0.02;ctx.fillStyle=`rgba(0,210,255,${0.22+Math.sin(s.t)*0.18})`;ctx.beginPath();ctx.arc(sx,s.y,s.s*0.85,0,Math.PI*2);ctx.fill();}
  }
}

// ── DRAW PLATFORM ──
function drawPlat(p,th){
  const sx=p.x-cam.x,sy=p.y-cam.y;if(sx+p.w<0||sx>CW)return;
  if(p.type==='ground'){
    ctx.fillStyle=th.ground;ctx.fillRect(sx,sy,p.w,p.h);
    if(P.era==='past'){ctx.fillStyle=th.platT;ctx.fillRect(sx,sy,p.w,5);for(let gx=sx%28;gx<p.w+28;gx+=28){const rx=sx+gx;if(rx<-10||rx>CW+10)continue;ctx.fillStyle='#4a7a18';ctx.fillRect(rx,sy-5,16,7);ctx.fillRect(rx+3,sy-9,10,5);}}
    else{ctx.fillStyle=th.platT;ctx.fillRect(sx,sy,p.w,3);ctx.strokeStyle='rgba(0,180,255,0.1)';ctx.lineWidth=1;for(let lx=sx%50;lx<p.w+50;lx+=50){ctx.beginPath();ctx.moveTo(sx+lx,sy);ctx.lineTo(sx+lx,sy+p.h);ctx.stroke();}}
    return;
  }
  if(p.type==='holo'){
    const pp=0.55+Math.sin(gT*0.045+p.x*0.01)*0.35;
    const hg=ctx.createLinearGradient(sx,sy,sx,sy+p.h);
    hg.addColorStop(0,`rgba(${th.aR},${th.aG},${th.aB},${0.4*pp})`);hg.addColorStop(1,`rgba(${th.aR},${th.aG},${th.aB},${0.08*pp})`);
    ctx.fillStyle=hg;ctx.beginPath();ctx.roundRect(sx,sy,p.w,p.h,3);ctx.fill();
    ctx.strokeStyle=`rgba(${th.aR},${th.aG},${th.aB},${0.8*pp})`;ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(sx,sy,p.w,p.h,3);ctx.stroke();
    const sc=((gT*2.5)%(p.h+24))-8;ctx.fillStyle=`rgba(${th.aR},${th.aG},${th.aB},${0.25*pp})`;ctx.fillRect(sx,sy+sc,p.w,3);
    return;
  }
  if(p.type==='conveyor'){
    ctx.fillStyle='#152535';ctx.beginPath();ctx.roundRect(sx,sy,p.w,p.h,2);ctx.fill();
    ctx.fillStyle='#0a1825';ctx.fillRect(sx,sy,p.w,5);ctx.fillRect(sx,sy+p.h-5,p.w,5);
    const sp2=p.dir*gT*2.2,bsz=28;
    for(let bx=((sp2%bsz)+bsz)%bsz-bsz;bx<p.w+bsz;bx+=bsz){ctx.fillStyle='rgba(0,180,255,0.22)';ctx.fillRect(sx+bx,sy+5,bsz*0.5,p.h-10);}
    ctx.fillStyle='rgba(0,220,255,0.6)';ctx.font='bold 11px monospace';ctx.textAlign='center';ctx.fillText(p.dir>0?'► ► ►':'◄ ◄ ◄',sx+p.w/2,sy+p.h/2+4);
    ctx.strokeStyle='rgba(0,180,255,0.35)';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(sx,sy,p.w,p.h,2);ctx.stroke();
    return;
  }
  if(P.era==='past'){
    ctx.fillStyle=th.platS;ctx.beginPath();ctx.roundRect(sx+3,sy+4,p.w,p.h,3);ctx.fill();
    ctx.fillStyle=th.platB;ctx.beginPath();ctx.roundRect(sx,sy,p.w,p.h,3);ctx.fill();
    ctx.fillStyle=th.platT;ctx.fillRect(sx,sy,p.w,4);
    ctx.fillStyle='rgba(0,0,0,0.1)';for(let px=10;px<p.w-4;px+=20)ctx.fillRect(sx+px,sy+6,12,7);
    ctx.fillStyle='rgba(60,110,25,0.25)';for(let mx=2;mx<p.w-4;mx+=18)ctx.fillRect(sx+mx,sy,12,3);
  } else {
    ctx.fillStyle=th.platS;ctx.beginPath();ctx.roundRect(sx+2,sy+3,p.w,p.h,3);ctx.fill();
    ctx.fillStyle='#0c2030';ctx.beginPath();ctx.roundRect(sx,sy,p.w,p.h,3);ctx.fill();
    ctx.fillStyle=th.platT;ctx.fillRect(sx,sy,p.w,3);
    ctx.fillStyle='rgba(0,150,220,0.35)';ctx.beginPath();ctx.arc(sx+7,sy+10,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(sx+p.w-7,sy+10,3,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(0,160,240,0.15)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(sx+14,sy+10);ctx.lineTo(sx+p.w-14,sy+10);ctx.stroke();
  }
}

// ── DRAW COLLECTIBLE ──
function drawCol(c,th){
  if(c.collected)return;if(c.era!=='both'&&c.era!==P.era&&P.bonus!=='magnet')return;
  const sx=c.x-cam.x,sy=c.y-cam.y+Math.sin(gT*0.06+c.t)*5;if(sx<-20||sx>CW+20)return;
  const pp=0.6+Math.sin(gT*0.07+c.x*0.02)*0.35;
  const gr=ctx.createRadialGradient(sx,sy,0,sx,sy,18);
  gr.addColorStop(0,`rgba(${th.colR},${th.colG},${th.colB},${0.45*pp})`);gr.addColorStop(1,`rgba(${th.colR},${th.colG},${th.colB},0)`);
  ctx.fillStyle=gr;ctx.beginPath();ctx.arc(sx,sy,18,0,Math.PI*2);ctx.fill();
  if(P.era==='past'){
    ctx.save();ctx.translate(sx,sy);ctx.rotate(gT*0.02);ctx.fillStyle=th.col;
    for(let i=0;i<6;i++){ctx.save();ctx.rotate(i/6*Math.PI*2);ctx.beginPath();ctx.moveTo(0,-8*pp);ctx.lineTo(2*pp,-3);ctx.lineTo(-2*pp,-3);ctx.closePath();ctx.fill();ctx.restore();}
    ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.55)';ctx.lineWidth=1;ctx.stroke();ctx.restore();
  } else {
    ctx.save();ctx.translate(sx,sy);ctx.rotate(gT*0.015);const s=7*pp;ctx.fillStyle=th.col;
    ctx.beginPath();for(let i=0;i<8;i++){const a=i/8*Math.PI*2;i===0?ctx.moveTo(Math.cos(a)*s,Math.sin(a)*s):ctx.lineTo(Math.cos(a)*s,Math.sin(a)*s);}
    ctx.closePath();ctx.fill();ctx.strokeStyle='rgba(0,0,0,0.35)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='rgba(0,0,0,0.25)';ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fill();ctx.restore();
  }
}

// ── DRAW BONUS ──
function drawBonus(b){
  if(b.collected)return;if(b.era!=='both'&&b.era!==P.era)return;
  const sx=b.x-cam.x,sy=b.y-cam.y+Math.sin(gT*0.05+b.x)*6;if(sx<-30||sx>CW+30)return;
  const bc=BONUS_COL[b.type],pp=0.6+Math.sin(gT*0.09+b.x)*0.35;
  const gr=ctx.createRadialGradient(sx,sy,0,sx,sy,24);gr.addColorStop(0,bc+'55');gr.addColorStop(1,bc+'00');
  ctx.fillStyle=gr;ctx.beginPath();ctx.arc(sx,sy,24,0,Math.PI*2);ctx.fill();
  ctx.save();ctx.translate(sx,sy);ctx.rotate(gT*0.025);
  ctx.fillStyle=bc+'2a';ctx.strokeStyle=bc;ctx.lineWidth=2;
  ctx.beginPath();for(let i=0;i<6;i++){const a=i/6*Math.PI*2;i===0?ctx.moveTo(Math.cos(a)*13,Math.sin(a)*13):ctx.lineTo(Math.cos(a)*13,Math.sin(a)*13);}
  ctx.closePath();ctx.fill();ctx.stroke();ctx.restore();
  ctx.font=`${16*pp}px serif`;ctx.textAlign='center';ctx.fillText(BONUS_ICO[b.type],sx,sy+5);
  ctx.font='8px "Courier New"';ctx.fillStyle=bc;ctx.fillText(b.type.toUpperCase(),sx,sy+20);
}

// ── DRAW ENEMY ──
function drawEnemy(e,th){
  if(e.era!=='both'&&e.era!==P.era)return;
  const sx=e.x-cam.x,sy=e.y-cam.y,cx=sx+e.w/2,cy=sy+e.h/2;
  if(sx+e.w<-30||sx>CW+30)return;
  const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,26);
  gr.addColorStop(0,'rgba(200,40,40,0.22)');gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gr;ctx.beginPath();ctx.arc(cx,cy,26,0,Math.PI*2);ctx.fill();

  if(e.type==='scarab'){
    ctx.fillStyle='#2a1000';ctx.beginPath();ctx.ellipse(cx,cy,e.w/2+2,e.h/2+2,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#8b2000';ctx.beginPath();ctx.ellipse(cx,cy-2,e.w/2,e.h/2,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(200,60,0,0.35)';ctx.beginPath();ctx.ellipse(cx-3,cy-4,e.w/4,e.h/4,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff8800';ctx.beginPath();ctx.arc(cx-5,cy-5,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+5,cy-5,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff2200';ctx.beginPath();ctx.arc(cx-5,cy-5,1.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+5,cy-5,1.5,0,Math.PI*2);ctx.fill();
    const la=Math.sin(gT*0.18)*5;ctx.strokeStyle='#5a1800';ctx.lineWidth=2;
    for(let l=0;l<3;l++){ctx.beginPath();ctx.moveTo(sx+4,sy+6+l*6);ctx.lineTo(sx-8,sy+6+l*6+la);ctx.stroke();ctx.beginPath();ctx.moveTo(sx+e.w-4,sy+6+l*6);ctx.lineTo(sx+e.w+8,sy+6+l*6-la);ctx.stroke();}
    ctx.strokeStyle='#8b2000';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(cx-4,sy+2);ctx.lineTo(cx-10,sy-8);ctx.stroke();ctx.beginPath();ctx.moveTo(cx+4,sy+2);ctx.lineTo(cx+10,sy-8);ctx.stroke();
  } else if(e.type==='plant'){
    const sw=Math.sin(gT*0.04)*5;
    ctx.strokeStyle='#2a7010';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(cx,sy+e.h);ctx.quadraticCurveTo(cx+sw,sy+e.h*0.5,cx,sy+8);ctx.stroke();
    ctx.fillStyle='#3a8a18';ctx.beginPath();ctx.ellipse(cx-12+sw*0.5,sy+e.h*0.55,12,6,-0.4,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(cx+12+sw*0.5,sy+e.h*0.7,12,6,0.4,0,Math.PI*2);ctx.fill();
    const mo=0.4+Math.sin(gT*0.05)*0.5;ctx.fillStyle='#3a0a00';ctx.beginPath();ctx.ellipse(cx,sy+8,14,12,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#8b0000';ctx.beginPath();ctx.ellipse(cx,sy+10,12,8*mo,0,0,Math.PI);ctx.fill();
    ctx.fillStyle='#f0f0d0';for(let d=0;d<5;d++){const dx=cx-10+d*5;ctx.beginPath();ctx.moveTo(dx,sy+6);ctx.lineTo(dx+2.5,sy+12);ctx.lineTo(dx+5,sy+6);ctx.fill();}
    ctx.fillStyle='#ff4400';ctx.beginPath();ctx.ellipse(cx-6,sy+2,4,3,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(cx+6,sy+2,4,3,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(cx-6,sy+2,2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+6,sy+2,2,0,Math.PI*2);ctx.fill();
  } else if(e.type==='drone'){
    const rot=gT*0.28;
    ctx.fillStyle='#1a2535';ctx.strokeStyle='#ff3060';ctx.lineWidth=2;
    ctx.beginPath();for(let i=0;i<6;i++){const a=i/6*Math.PI*2;i===0?ctx.moveTo(cx+Math.cos(a)*13,cy+Math.sin(a)*9):ctx.lineTo(cx+Math.cos(a)*13,cy+Math.sin(a)*9);}
    ctx.closePath();ctx.fill();ctx.stroke();
    ctx.fillStyle='#ff1040';ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(255,60,80,${0.3+Math.sin(gT*0.12)*0.2})`;ctx.beginPath();ctx.arc(cx,cy,8,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(0,200,255,0.45)';ctx.lineWidth=1.5;
    for(let r=0;r<4;r++){const ra=r/4*Math.PI*2+rot;ctx.beginPath();ctx.arc(cx+Math.cos(ra)*13,cy+Math.sin(ra)*9,6,0,Math.PI*2);ctx.stroke();}
    ctx.strokeStyle='rgba(255,48,96,0.25)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(cx,sy+e.h);ctx.lineTo(cx,sy+e.h+50);ctx.stroke();ctx.setLineDash([]);
  } else if(e.type==='robot'){
    ctx.fillStyle='#1a2535';ctx.beginPath();ctx.roundRect(sx+4,sy+12,e.w-8,e.h-12,3);ctx.fill();
    ctx.fillStyle='#0d1a2a';ctx.beginPath();ctx.roundRect(sx+2,sy,e.w-4,14,3);ctx.fill();
    const ep=0.5+Math.sin(gT*0.09)*0.5;
    ctx.fillStyle=`rgba(255,48,96,${ep})`;ctx.beginPath();ctx.roundRect(sx+4,sy+3,7,5,1);ctx.fill();ctx.beginPath();ctx.roundRect(sx+e.w-11,sy+3,7,5,1);ctx.fill();
    const ba=Math.sin(gT*0.07)*7;ctx.fillStyle='#0d1a2a';
    ctx.beginPath();ctx.roundRect(sx-4,sy+12+ba,5,14,2);ctx.fill();ctx.beginPath();ctx.roundRect(sx+e.w-1,sy+12-ba,5,14,2);ctx.fill();
    ctx.fillStyle='#0a1525';ctx.beginPath();ctx.arc(sx-2,sy+26+ba,4,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(sx+e.w+2,sy+26-ba,4,0,Math.PI*2);ctx.fill();
    const cp=0.4+Math.sin(gT*0.05)*0.3;
    ctx.fillStyle=`rgba(0,180,255,${cp})`;ctx.fillRect(sx+8,sy+17,e.w-16,3);ctx.fillRect(sx+8,sy+24,e.w-16,2);
    ctx.fillStyle=`rgba(0,255,200,${cp+0.2})`;ctx.beginPath();ctx.arc(sx+e.w/2,sy+30,2.5,0,Math.PI*2);ctx.fill();
  }
}

// ── DRAW PARTICLES ──
function drawParts(){
  for(const p of parts){
    const sx=p.isTxt?p.x:p.x-cam.x,sy=p.isTxt?p.y:p.y-cam.y;
    ctx.globalAlpha=p.life;
    if(p.isTxt){ctx.font=`bold ${p.size}px "Courier New"`;ctx.textAlign='center';ctx.fillStyle=p.col;ctx.shadowColor=p.col;ctx.shadowBlur=8;ctx.fillText(p.txt,sx,sy);ctx.shadowBlur=0;}
    else{ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(sx,sy,p.size*p.life,0,Math.PI*2);ctx.fill();}
  }
  ctx.globalAlpha=1;
}

// ── DRAW HUD ──
function drawHUD(th){
  // Barre top
  ctx.fillStyle='rgba(4,2,12,0.85)';ctx.fillRect(0,0,CW,52);
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,52);ctx.lineTo(CW,52);ctx.stroke();

  // Ère (capsule gauche)
  const ec=P.era==='past'?'#e8a030':'#00e5ff',er=P.era==='past'?232:0,eg=P.era==='past'?160:229,eb=P.era==='past'?48:255;
  ctx.fillStyle=`rgba(${er},${eg},${eb},0.1)`;ctx.beginPath();ctx.roundRect(8,8,128,36,8);ctx.fill();
  ctx.strokeStyle=`rgba(${er},${eg},${eb},0.45)`;ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(8,8,128,36,8);ctx.stroke();
  ctx.font='bold 13px "Courier New"';ctx.textAlign='left';ctx.fillStyle=ec;
  ctx.fillText(P.era==='past'?'📜  PASSÉ':'🔬  FUTUR',18,31);

  // Barre switch
  const sr=P.swCd/30;
  ctx.fillStyle='rgba(255,255,255,0.08)';ctx.beginPath();ctx.roundRect(144,22,80,10,4);ctx.fill();
  if(sr>0){ctx.fillStyle='rgba(255,255,255,0.15)';ctx.beginPath();ctx.roundRect(144,22,80*(1-sr),10,4);ctx.fill();}
  else{const sg=ctx.createLinearGradient(144,0,224,0);sg.addColorStop(0,ec);sg.addColorStop(1,ec+'66');ctx.fillStyle=sg;ctx.beginPath();ctx.roundRect(144,22,80,10,4);ctx.fill();}
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(144,22,80,10,4);ctx.stroke();
  ctx.font='8px "Courier New"';ctx.textAlign='center';ctx.fillStyle=sr>0?'rgba(120,120,120,0.7)':ec;ctx.fillText(sr>0?'SWITCH...':'[E] SWITCH',184,19);

  // Score central
  ctx.fillStyle='rgba(255,255,255,0.05)';ctx.beginPath();ctx.roundRect(CW/2-64,7,128,38,8);ctx.fill();
  ctx.font='8px "Courier New"';ctx.fillStyle='rgba(255,255,255,0.35)';ctx.fillText('SCORE',CW/2,19);
  ctx.font='bold 19px "Courier New"';ctx.fillStyle='#ffffff';ctx.fillText(P.totalScore,CW/2,38);

  // Fragments droite
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.beginPath();ctx.roundRect(CW-136,8,128,36,8);ctx.fill();
  ctx.strokeStyle=`rgba(${th.colR},${th.colG},${th.colB},0.35)`;ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(CW-136,8,128,36,8);ctx.stroke();
  ctx.font='8px "Courier New"';ctx.textAlign='right';ctx.fillStyle=`rgba(${th.colR},${th.colG},${th.colB},0.6)`;ctx.fillText('FRAGMENTS',CW-12,19);
  ctx.font='bold 15px "Courier New"';ctx.fillStyle=th.col;ctx.fillText(`${P.score}/${cols.length}`,CW-12,37);

  // Bonus actif (bas gauche)
  if(P.bonus){
    const bc=BONUS_COL[P.bonus],bt=P.bonusT/BONUS_DUR;
    ctx.fillStyle='rgba(0,0,0,0.72)';ctx.beginPath();ctx.roundRect(8,CH-52,158,44,8);ctx.fill();
    ctx.strokeStyle=bc+'66';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(8,CH-52,158,44,8);ctx.stroke();
    ctx.font='11px "Courier New"';ctx.textAlign='left';ctx.fillStyle=bc;ctx.fillText(BONUS_ICO[P.bonus]+' '+BONUS_LBL[P.bonus],16,CH-35);
    ctx.fillStyle='rgba(255,255,255,0.08)';ctx.beginPath();ctx.roundRect(14,CH-22,138,8,4);ctx.fill();
    ctx.fillStyle=bc;ctx.beginPath();ctx.roundRect(14,CH-22,138*bt,8,4);ctx.fill();
  }

  // Combo
  if(P.combo>1&&P.comboT>0){
    const ca=Math.min(1,P.comboT/30);
    ctx.font=`bold ${16+P.combo*2}px "Courier New"`;ctx.textAlign='center';
    ctx.fillStyle=`rgba(255,210,50,${ca})`;ctx.fillText(`✦ COMBO x${P.combo} ✦`,CW/2,CH-18);
  }

  // Notifications
  ctx.textAlign='right';
  for(let i=0;i<Math.min(P.notifs.length,4);i++){
    const n=P.notifs[i],al=Math.min(1,n.timer/40),ny=CH-68-i*34;
    ctx.globalAlpha=al;
    ctx.fillStyle='rgba(0,0,0,0.65)';ctx.beginPath();ctx.roundRect(CW-252,ny,244,26,6);ctx.fill();
    ctx.font='bold 10px "Courier New"';ctx.fillStyle=n.col;ctx.fillText(n.txt,CW-12,ny+17);
    ctx.globalAlpha=1;
  }

  // Missions mini panel
  const done=missions.filter(m=>m.done).length,total=missions.length;
  const mx=CW/2-96,my=CH-46,mw=192,mh=38;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.roundRect(mx,my,mw,mh,8);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(mx,my,mw,mh,8);ctx.stroke();
  ctx.font='8px "Courier New"';ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,0.35)';ctx.fillText(`MISSIONS ${done}/${total}`,CW/2,my+12);
  const sw2=(mw-16)/total;
  for(let i=0;i<total;i++){
    const m=missions[i],bx=mx+8+i*sw2,by=my+18,bw=sw2-3,bh=12;
    ctx.fillStyle='rgba(255,255,255,0.07)';ctx.beginPath();ctx.roundRect(bx,by,bw,bh,2);ctx.fill();
    if(m.done){ctx.fillStyle='#ffd700';ctx.beginPath();ctx.roundRect(bx,by,bw,bh,2);ctx.fill();}
    else if(m.goal>1){ctx.fillStyle=th.acc+'66';ctx.beginPath();ctx.roundRect(bx,by,bw*(m.progress/m.goal),bh,2);ctx.fill();}
    ctx.font='6px "Courier New"';ctx.textAlign='center';
    ctx.fillStyle=m.done?'#1a1000':'rgba(180,180,180,0.5)';ctx.fillText(m.done?'✓':m.label.slice(0,4),bx+bw/2,by+9);
  }
}

// ── DEAD SCREEN ──
function drawDead(){
  ctx.fillStyle='rgba(60,0,0,0.72)';ctx.fillRect(0,0,CW,CH);
  const vg=ctx.createRadialGradient(CW/2,CH/2,80,CW/2,CH/2,400);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.65)');ctx.fillStyle=vg;ctx.fillRect(0,0,CW,CH);
  ctx.textAlign='center';ctx.shadowColor='#ff0000';ctx.shadowBlur=30;
  ctx.font='bold 52px "Courier New"';ctx.fillStyle='#ff4444';ctx.fillText('MORT',CW/2,CH/2-40);ctx.shadowBlur=0;
  ctx.font='15px "Courier New"';ctx.fillStyle='rgba(255,200,200,0.65)';ctx.fillText('Décès #'+P.dCount,CW/2,CH/2);
  ctx.font='12px "Courier New"';ctx.fillStyle='rgba(200,150,150,0.5)';ctx.fillText('Respawn automatique...',CW/2,CH/2+28);
  const progress=1-P.dTimer/100;
  ctx.fillStyle='rgba(255,255,255,0.1)';ctx.beginPath();ctx.roundRect(CW/2-100,CH/2+50,200,6,3);ctx.fill();
  ctx.fillStyle='#ff4444';ctx.beginPath();ctx.roundRect(CW/2-100,CH/2+50,200*progress,6,3);ctx.fill();
}

// ── WIN SCREEN ──
function drawWin(){
  const g=ctx.createLinearGradient(0,0,0,CH);g.addColorStop(0,'#050208');g.addColorStop(0.5,'#100820');g.addColorStop(1,'#050208');ctx.fillStyle=g;ctx.fillRect(0,0,CW,CH);
  for(let i=0;i<6;i++){const px=(gT*0.5+i*112)%CW,py=(gT*0.3+i*67)%CH;ctx.fillStyle=i%2===0?'rgba(255,215,0,0.12)':'rgba(0,230,255,0.12)';ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);ctx.fill();}
  ctx.textAlign='center';
  const wg=ctx.createLinearGradient(CW/2-200,0,CW/2+200,0);wg.addColorStop(0,'#ffd700');wg.addColorStop(0.5,'#fff');wg.addColorStop(1,'#00e5ff');
  ctx.shadowColor='rgba(255,215,0,0.7)';ctx.shadowBlur=35;ctx.font='bold 52px "Courier New"';ctx.fillStyle=wg;ctx.fillText('VICTOIRE!',CW/2,110);ctx.shadowBlur=0;
  ctx.font='14px "Courier New"';ctx.fillStyle='rgba(255,255,255,0.45)';ctx.fillText('Tim a traversé toutes les ères!',CW/2,148);
  const el=Math.floor((Date.now()-P.startT)/1000),mn=Math.floor(el/60),sc=el%60;
  const stats=[['SCORE FINAL',P.totalScore+' pts'],['FRAGMENTS',P.score+'/'+cols.length],['TEMPS',mn+':'+sc.toString().padStart(2,'0')],['SWITCHES',P.swCount],['DÉCÈS',P.dCount],['BONUS ACTIFS',P.bonCount]];
  const sy0=170;ctx.fillStyle='rgba(255,255,255,0.05)';ctx.beginPath();ctx.roundRect(CW/2-210,sy0,420,stats.length*34+18,12);ctx.fill();
  for(let i=0;i<stats.length;i++){
    const y=sy0+16+i*34;
    ctx.font='11px "Courier New"';ctx.textAlign='left';ctx.fillStyle='rgba(200,200,200,0.45)';ctx.fillText(stats[i][0],CW/2-190,y);
    ctx.textAlign='right';ctx.font='bold 15px "Courier New"';ctx.fillStyle='#ffd700';ctx.fillText(stats[i][1],CW/2+190,y);
    if(i<stats.length-1){ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(CW/2-190,y+7);ctx.lineTo(CW/2+190,y+7);ctx.stroke();}
  }
  const dm=missions.filter(m=>m.done).length;
  ctx.textAlign='center';ctx.font='11px "Courier New"';ctx.fillStyle='rgba(255,215,0,0.55)';ctx.fillText(`★ MISSIONS ${dm}/${missions.length} ACCOMPLIES ★`,CW/2,sy0+stats.length*34+30);
  const by=500,bw=200,bx=CW/2-bw/2,pp=0.7+Math.sin(gT*0.07)*0.3;
  ctx.fillStyle=`rgba(0,180,255,${0.18*pp})`;ctx.beginPath();ctx.roundRect(bx,by,bw,44,10);ctx.fill();
  ctx.strokeStyle=`rgba(0,220,255,${pp})`;ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(bx,by,bw,44,10);ctx.stroke();
  ctx.font='bold 18px "Courier New"';ctx.fillStyle=`rgba(0,230,255,${pp})`;ctx.fillText('▶  REJOUER',CW/2,by+28);
  if(consume('Space')||consume('Enter'))init();
}

// ── MAIN LOOP ──
canvas.addEventListener('click',()=>{if(screen==='start')init();else if(screen==='win')init();});

function loop(ts){
  const jpK=Object.keys(jp);
  lastTime=ts;gT++;
  ctx.clearRect(0,0,CW,CH);

  if(screen==='start'){drawStart();}
  else {
    if(screen==='playing'){updateP();updEnemies();}
    updParts();updCam();
    const th=TH[P.era];
    drawBG(th);
    for(const p of PLAT_DEF)if(p.era==='both'||p.era===P.era)drawPlat(p,th);
    for(const c of cols)drawCol(c,th);
    for(const b of bonuses)drawBonus(b);
    for(const e of enemies)drawEnemy(e,th);
    drawTim(th);
    drawParts();
    drawHUD(th);
    if(screen==='dead')drawDead();
    if(screen==='win')drawWin();
  }
  for(const k of jpK)delete jp[k];
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
